<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌸 花园世界 · 多公会版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif; }
        body { background: linear-gradient(145deg, #e8f5e9 0%, #c8e6c9 100%); min-height: 100vh; padding: 20px 16px; display: flex; align-items: flex-start; justify-content: center; }
        .container { max-width: 750px; width: 100%; margin: 0 auto; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); padding: 28px 22px; border-radius: 48px 24px 48px 24px; box-shadow: 0 20px 40px rgba(30,60,20,0.12); border: 1px solid rgba(160,200,120,0.3); max-height: calc(100vh - 40px); overflow-y: auto; }
        h1 { color: #2e5a1e; text-align: center; font-weight: 600; font-size: 2rem; margin-bottom: 6px; }
        .subtitle { text-align: center; color: #5a7e4a; margin-bottom: 20px; font-size: 0.95rem; border-bottom: 1px dashed #a4c28e; padding-bottom: 14px; }
        .auth-container { max-width: 400px; margin: 0 auto; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 24px; background: rgba(230,245,210,0.6); padding: 5px; border-radius: 50px; }
        .auth-tab { flex: 1; padding: 12px; border: none; background: transparent; color: #3a5e2a; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .auth-tab.active { background: #3a7a2e; color: white; }
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .auth-input { padding: 14px 18px; border: 1.5px solid #b8daa0; border-radius: 40px; font-size: 1rem; background: white; outline: none; }
        .auth-btn { padding: 14px; background: #3a7a2e; color: white; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; box-shadow: 0 5px 0 #245218; font-size: 1.1rem; }
        .auth-footer { text-align: center; margin-top: 16px; color: #5a7e4a; font-size: 0.9rem; }
        .error-message { color: #d32f2f; text-align: center; font-size: 0.9rem; min-height: 24px; }
        .app-container { display: none; }
        .user-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding: 8px 16px; background: rgba(230,245,210,0.5); border-radius: 50px; }
        .user-info { display: flex; align-items: center; gap: 8px; }
        .guild-badge { background: #3a7a2e; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .logout-btn { padding: 8px 16px; background: #d32f2f; color: white; border: none; border-radius: 30px; cursor: pointer; }
        .btn-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 18px; }
        .query-btn { padding: 10px 24px; border: none; background: #e0f0d0; color: #3a5e2a; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .query-btn.active { background: #3a7a2e; color: white; }
        .search-box { display: flex; gap: 8px; margin-bottom: 18px; background: white; padding: 6px 6px 6px 18px; border-radius: 50px; border: 1.5px solid #b8daa0; }
        #searchInput { flex: 1; padding: 12px; border: none; background: transparent; outline: none; }
        #searchBtn { padding: 12px 24px; background: #3a7a2e; color: white; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .stats-row { display: flex; gap: 10px; margin-bottom: 18px; }
        .stat-card { flex: 1; background: linear-gradient(135deg, #f0f8ea, #e0efd5); padding: 16px; border-radius: 20px; text-align: center; cursor: pointer; }
        .stat-number { font-size: 2rem; font-weight: 700; color: #1e5a1e; }
        .result-area { min-height: 160px; padding: 16px; background: rgba(255,255,255,0.7); border-radius: 24px; border: 1px solid #cde0bd; margin-bottom: 18px; }
        .flower-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .flower-card { padding: 12px 6px; text-align: center; border-radius: 20px; font-size: 0.9rem; cursor: pointer; }
        .flower-card.xian { background: #ffcdd2; border: 1px solid #e53935; color: #b71c1c; }
        .flower-card.hua { background: #ffecb3; border: 1px solid #f9a825; color: #e65100; }
        .flower-card.zhen { background: #e1bee7; border: 1px solid #8e24aa; color: #4a148c; }
        .flower-card.pu { background: #bbdefb; border: 1px solid #1e88e5; color: #0d47a1; }
        .flower-card.fan { background: #c8e6c9; border: 1px solid #43a047; color: #1b5e20; }
        .collapsible { margin-top: 16px; border-top: 1px dashed #a4c28e; padding-top: 16px; }
        .collapse-header { display: flex; align-items: center; gap: 10px; cursor: pointer; color: #2e5a1e; font-weight: 600; padding: 8px 0; }
        .collapse-content { max-height: 0; overflow: hidden; transition: max-height 0.3s; }
        .collapse-content.open { max-height: 400px; overflow-y: auto; }
        .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        .form-input { flex: 1; padding: 12px 16px; border: 1.5px solid #b8daa0; border-radius: 40px; background: white; }
        .add-btn { padding: 12px 24px; background: #e68900; color: white; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .sync-status { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; color: #3e6a2e; }
        .refresh-btn { padding: 8px 18px; background: #6f9e4c; color: white; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 0 #3e6925; }
        .footer { text-align: center; color: #6b8a58; font-size: 0.8rem; margin-top: 20px; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; max-width: 500px; width: 100%; max-height: 70vh; border-radius: 32px; overflow: hidden; }
        .modal-header { padding: 20px 24px; background: linear-gradient(135deg, #e8f5e9, #c8e6c9); display: flex; align-items: center; justify-content: space-between; }
        .modal-title { font-size: 1.3rem; font-weight: 700; color: #2e5a1e; }
        .modal-close { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.5); border: none; cursor: pointer; }
        .modal-body { padding: 20px 24px; max-height: 50vh; overflow-y: auto; }
        .modal-input { padding: 14px 18px; border: 1.5px solid #b8daa0; border-radius: 40px; width: 100%; margin-bottom: 16px; }
        .modal-btn { padding: 14px; background: #3a7a2e; color: white; border: none; border-radius: 40px; font-weight: 600; width: 100%; cursor: pointer; }
        .invite-code-box { background: #f0f8ea; padding: 16px; border-radius: 20px; text-align: center; margin: 16px 0; }
        .invite-code { font-size: 1.5rem; font-weight: 700; font-family: monospace; color: #2e5a1e; }
        .copy-btn { background: #6f9e4c; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-left: 10px; }
        @media (max-width: 480px) { .flower-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
<div class="container">
    <div id="authContainer" class="auth-container">
        <h1>🌸 花园世界</h1>
        <p class="subtitle">多公会系统 · 邀请码登录</p>
        <div class="auth-tabs">
            <button class="auth-tab active" id="loginTab">登录</button>
            <button class="auth-tab" id="registerTab">注册</button>
        </div>
        <div id="loginForm" class="auth-form">
            <input type="email" id="loginEmail" class="auth-input" placeholder="邮箱">
            <input type="password" id="loginPassword" class="auth-input" placeholder="密码">
            <div id="loginError" class="error-message"></div>
            <button class="auth-btn" id="loginBtn">登录</button>
        </div>
        <div id="registerForm" class="auth-form" style="display:none;">
            <input type="email" id="registerEmail" class="auth-input" placeholder="邮箱">
            <input type="password" id="registerPassword" class="auth-input" placeholder="密码（至少6位）">
            <input type="text" id="inviteCode" class="auth-input" placeholder="邀请码">
            <div id="registerError" class="error-message"></div>
            <button class="auth-btn" id="registerBtn">注册</button>
        </div>
        <p class="auth-footer">🌱 需要邀请码？请联系公会会长</p>
    </div>

    <div id="appContainer" class="app-container">
        <div class="user-bar">
            <div class="user-info"><i class="fas fa-user-circle"></i><span id="displayName">花友</span><span class="guild-badge" id="guildBadge">gh001</span></div>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>
        <div id="ownerToolbar" style="display:none;margin-bottom:16px;padding:12px;background:rgba(255,215,0,0.2);border-radius:20px;align-items:center;gap:8px;">
            <i class="fas fa-crown" style="color:#f9a825;"></i><span style="font-weight:600;">会长工具</span>
            <button class="refresh-btn" onclick="openInviteModal()" style="margin-left:auto;"><i class="fas fa-key"></i> 生成邀请码</button>
        </div>
        <div class="btn-group">
            <button class="query-btn active" id="byMemberBtn"><i class="fas fa-user"></i> 查成员</button>
            <button class="query-btn" id="byFlowerBtn"><i class="fas fa-flower"></i> 查花卉</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入成员名字…"><button id="searchBtn"><i class="fas fa-search"></i> 查询</button>
        </div>
        <div class="stats-row">
            <div class="stat-card"><div class="stat-number" id="totalMembers">0</div><div class="stat-label">总成员</div></div>
            <div class="stat-card"><div class="stat-number" id="totalFlowers">0</div><div class="stat-label">花卉种类</div></div>
        </div>
        <div id="resultArea" class="result-area"><div style="color:#5a7e4a;text-align:center;padding:20px;">输入关键词查询</div></div>
        <div class="collapsible">
            <div class="collapse-header" onclick="toggleCollapse('addPanel')"><i class="fas fa-plus-circle" style="color:#e68900;"></i> 添加花卉记录<i class="fas fa-chevron-down" id="addIcon" style="margin-left:auto;"></i></div>
            <div id="addPanel" class="collapse-content"><div class="form-row"><input type="text" id="newMemberName" class="form-input" placeholder="成员名字"><input type="text" id="newFlowerName" class="form-input" placeholder="花卉名称"><button class="add-btn" id="addRecordBtn">添加</button></div></div>
        </div>
        <div class="sync-status"><span id="syncMessage">连接中...</span><button class="refresh-btn" id="refreshDataBtn">刷新</button></div>
        <p class="footer">仅限公会成员 · 数据隔离</p>
    </div>
</div>
<div class="modal-overlay" id="inviteModal">
    <div class="modal"><div class="modal-header"><span class="modal-title">🔑 生成邀请码</span><button class="modal-close" onclick="closeInviteModal()">✕</button></div>
    <div class="modal-body"><p>邀请码有效期10分钟，每个码只能用1次</p><button class="modal-btn" onclick="generateInviteCode()">+ 生成新邀请码</button><div id="inviteCodeList" style="margin-top:16px;"></div></div></div>
</div>

<script>
(function(){
    const SUPABASE_URL = "https://amngvhgusyipxnnkejzp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yIYNCHcT4Z0z-NMcKVmjTQ_6SoHyxwZ";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentUser = null, currentProfile = null, flowerData = [], queryMode = 'member';

    const authContainer = document.getElementById('authContainer');
    const appContainer = document.getElementById('appContainer');
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const displayName = document.getElementById('displayName');
    const guildBadge = document.getElementById('guildBadge');
    const ownerToolbar = document.getElementById('ownerToolbar');
    const inviteModal = document.getElementById('inviteModal');
    const inviteCodeList = document.getElementById('inviteCodeList');
    const totalMembersSpan = document.getElementById('totalMembers');
    const totalFlowersSpan = document.getElementById('totalFlowers');
    const syncMessage = document.getElementById('syncMessage');
    const resultArea = document.getElementById('resultArea');

    async function checkAuth() {
        const { data: { session } } = await supabase.auth.getSession();
        if(session) { currentUser = session.user; await loadProfile(); showApp(); }
        else { showAuth(); }
    }
    async function loadProfile() {
        const { data } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
        if(data) {
            currentProfile = data;
            displayName.textContent = data.nickname || data.email?.split('@')[0] || '花友';
            guildBadge.textContent = data.guild_id || 'gh001';
            ownerToolbar.style.display = data.role === 'owner' ? 'flex' : 'none';
        }
        await loadGuildData();
    }
    async function loadGuildData() {
        const guildId = currentProfile?.guild_id || 'gh001';
        const { data } = await supabase.from('flowers').select('data').eq('guild_id', guildId).single();
        if(data?.data) { flowerData = data.data; updateStats(); }
        syncMessage.textContent = `✅ 已连接 · ${guildId}`;
    }
    function updateStats() {
        totalMembersSpan.textContent = flowerData.length;
        const s = new Set();
        flowerData.forEach(m => { ['仙','华','珍','普','凡'].forEach(q => { if(m[q]) m[q].forEach(f => s.add(f)); }); });
        totalFlowersSpan.textContent = s.size;
    }
    function showAuth() { authContainer.style.display = 'block'; appContainer.style.display = 'none'; }
    function showApp() { authContainer.style.display = 'none'; appContainer.style.display = 'block'; }

    loginBtn.onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const err = document.getElementById('loginError');
        if(!email||!password) { err.textContent='请填写完整'; return; }
        err.textContent=''; loginBtn.textContent='登录中...'; loginBtn.disabled=true;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        loginBtn.textContent='登录'; loginBtn.disabled=false;
        if(error) { err.textContent='邮箱或密码错误'; }
        else { currentUser = data.user; await loadProfile(); showApp(); }
    };

    registerBtn.onclick = async () => {
        const email = document.getElementById('registerEmail').value.trim();
        const password = document.getElementById('registerPassword').value;
        const code = document.getElementById('inviteCode').value.trim();
        const err = document.getElementById('registerError');
        if(!email||!password||!code) { err.textContent='请填写所有字段'; return; }
        if(password.length<6) { err.textContent='密码至少6位'; return; }
        err.textContent=''; registerBtn.textContent='验证中...'; registerBtn.disabled=true;
        const { data: codeData, error: codeError } = await supabase.from('invite_codes').select('*').eq('code',code).eq('is_active',true).single();
        if(codeError||!codeData) { err.textContent='邀请码无效'; registerBtn.textContent='注册'; registerBtn.disabled=false; return; }
        if(new Date(codeData.expires_at) < new Date()) { err.textContent='邀请码已过期'; registerBtn.textContent='注册'; registerBtn.disabled=false; return; }
        const { data: userData, error: signUpError } = await supabase.auth.signUp({ email, password });
        if(signUpError) { err.textContent=signUpError.message; registerBtn.textContent='注册'; registerBtn.disabled=false; return; }
        await supabase.from('profiles').insert({ id: userData.user.id, nickname: email.split('@')[0], guild_id: codeData.guild_id, role: 'member' });
        await supabase.from('invite_codes').update({ used_count: 1, is_active: false }).eq('code', code);
        alert(`注册成功！欢迎加入 ${codeData.guild_id}`);
        loginTab.click();
        registerBtn.textContent='注册'; registerBtn.disabled=false;
    };

    logoutBtn.onclick = async () => { await supabase.auth.signOut(); showAuth(); };
    loginTab.onclick = () => { loginTab.classList.add('active'); registerTab.classList.remove('active'); loginForm.style.display='flex'; registerForm.style.display='none'; };
    registerTab.onclick = () => { registerTab.classList.add('active'); loginTab.classList.remove('active'); registerForm.style.display='flex'; loginForm.style.display='none'; };

    window.openInviteModal = async () => { inviteModal.style.display='flex'; await loadInviteCodes(); };
    window.closeInviteModal = () => inviteModal.style.display='none';

    async function loadInviteCodes() {
        const guildId = currentProfile?.guild_id;
        const { data } = await supabase.from('invite_codes').select('*').eq('guild_id',guildId).eq('is_active',true).order('created_at',{ascending:false});
        if(!data?.length) { inviteCodeList.innerHTML='<p style="color:#7f9f6b;">暂无有效邀请码</p>'; return; }
        inviteCodeList.innerHTML = data.map(c => `<div class="invite-code-box"><div style="display:flex;align-items:center;justify-content:center;"><span class="invite-code">${c.code}</span><button class="copy-btn" onclick="copyCode('${c.code}')">📋</button></div><p style="font-size:0.8rem;margin-top:8px;">过期: ${new Date(c.expires_at).toLocaleTimeString()}</p></div>`).join('');
    }

    window.generateInviteCode = async () => {
        const guildId = currentProfile?.guild_id || 'gh001';
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
        let random = '';
        for(let i=0;i<8;i++) random += chars.charAt(Math.floor(Math.random()*chars.length));
        const code = `${guildId}_${random}`;
        const { error } = await supabase.from('invite_codes').insert({ code, guild_id:guildId, type:'member', created_by:currentUser.id, expires_at: new Date(Date.now()+10*60*1000).toISOString() });
        if(error) { alert('生成失败: '+error.message); return; }
        await loadInviteCodes();
    };

    window.copyCode = (code) => { navigator.clipboard?.writeText(code); alert('已复制!'); };

    const byMemberBtn = document.getElementById('byMemberBtn');
    const byFlowerBtn = document.getElementById('byFlowerBtn');
    const searchBtn = document.getElementById('searchBtn');
    const searchInput = document.getElementById('searchInput');
    byMemberBtn.onclick = () => { queryMode='member'; byMemberBtn.classList.add('active'); byFlowerBtn.classList.remove('active'); };
    byFlowerBtn.onclick = () => { queryMode='flower'; byFlowerBtn.classList.add('active'); byMemberBtn.classList.remove('active'); };

    function getFlowerQuality(f) {
        const map = { "星河映蕊":"仙","福运招财":"仙","花漾春山":"仙","宝珠玉兰":"华","纸鸢探春":"华","琼台玉露":"华","冰蓝矮牵牛":"珍","白百合":"凡","康乃馨":"凡","铃兰":"凡" };
        return map[f] || '凡';
    }

    searchBtn.onclick = () => {
        const kw = searchInput.value.trim(); if(!kw) return;
        if(queryMode==='member') {
            const m = flowerData.find(m=>m.name.includes(kw));
            if(m) { const fs=[]; ['仙','华','珍','普','凡'].forEach(q=>{ if(m[q]) m[q].forEach(f=>fs.push({name:f,quality:q})); }); const qc={仙:'xian',华:'hua',珍:'zhen',普:'pu',凡:'fan'}; resultArea.innerHTML=`<div class="flower-grid">${fs.map(f=>`<div class="flower-card ${qc[f.quality]}">${f.name}</div>`).join('')}</div>`; }
            else { resultArea.innerHTML='<div style="color:#a00;text-align:center;">❌ 未找到</div>'; }
        } else {
            const ms = flowerData.filter(m=>['仙','华','珍','普','凡'].some(q=>m[q]?.includes(kw)));
            resultArea.innerHTML = ms.length ? ms.map(m=>`<span style="display:inline-block;background:#e0f0d0;padding:6px 16px;border-radius:30px;margin:4px;">${m.name}</span>`).join('') : '<div style="color:#a00;text-align:center;">❌ 未找到</div>';
        }
    };

    document.getElementById('addRecordBtn').onclick = async () => {
        const mName = document.getElementById('newMemberName').value.trim();
        const fName = document.getElementById('newFlowerName').value.trim();
        if(!mName||!fName) return;
        const q = getFlowerQuality(fName);
        let m = flowerData.find(m=>m.name===mName);
        if(!m) { m = { name:mName, 仙:[],华:[],珍:[],普:[],凡:[] }; flowerData.push(m); }
        if(!m[q]) m[q] = [];
        if(!m[q].includes(fName)) { m[q].push(fName); }
        await saveGuildData();
        document.getElementById('newMemberName').value = '';
        document.getElementById('newFlowerName').value = '';
        updateStats();
    };

    async function saveGuildData() {
        const guildId = currentProfile?.guild_id || 'gh001';
        const { data } = await supabase.from('flowers').select('id').eq('guild_id',guildId).single();
        if(data) { await supabase.from('flowers').update({ data:flowerData }).eq('id',data.id); }
        syncMessage.textContent = `✅ 已保存 · ${guildId}`;
    }

    document.getElementById('refreshDataBtn').onclick = loadGuildData;
    window.toggleCollapse = (id) => { const p=document.getElementById(id), i=document.getElementById('addIcon'); p.classList.toggle('open'); i.classList.toggle('fa-chevron-down'); i.classList.toggle('fa-chevron-up'); };

    checkAuth();
    document.getElementById('addPanel').classList.add('open');
    document.getElementById('addIcon').classList.add('fa-chevron-up');
})();
</script>
</body>
</html>
