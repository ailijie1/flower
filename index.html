<!-- 批量导入弹窗（图鉴选择版） -->
<div class="modal-overlay" id="batchModal">
    <div class="modal" style="max-width:600px;" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title"><i class="fas fa-file-import"></i> 从图鉴批量导入</span>
            <button class="modal-close" onclick="closeBatchModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <input type="text" id="batchMemberName" class="modal-input" placeholder="成员名字">
            
            <!-- 品质筛选标签 -->
            <div class="filter-tabs" style="margin-bottom:12px;">
                <button class="filter-tab all active" data-filter="all">全</button>
                <button class="filter-tab xian" data-filter="仙">仙</button>
                <button class="filter-tab hua" data-filter="华">华</button>
                <button class="filter-tab zhen" data-filter="珍">珍</button>
                <button class="filter-tab pu" data-filter="普">普</button>
                <button class="filter-tab fan" data-filter="凡">凡</button>
            </div>
            
            <!-- 搜索框 -->
            <input type="text" id="batchSearchInput" class="modal-search" placeholder="🔍 搜索花卉..." oninput="filterBatchFlowers()">
            
            <!-- 花卉列表 -->
            <div id="batchFlowerList" style="max-height:300px; overflow-y:auto; border:1px solid #cde0bd; border-radius:16px; padding:12px; background:rgba(255,255,255,0.5);">
                加载中...
            </div>
            
            <!-- 已选数量 -->
            <div style="margin-top:12px; display:flex; justify-content:space-between; align-items:center;">
                <span id="selectedCount">已选 0 种花卉</span>
                <button class="modal-btn" onclick="selectAllVisible()" style="width:auto; padding:8px 16px; background:#6f9e4c;">全选当前</button>
            </div>
            
            <div style="display:flex; gap:10px; margin-top:16px;">
                <button class="modal-btn" onclick="executeBatchImportFromSelection()" style="flex:1;"><i class="fas fa-upload"></i> 导入选中</button>
            </div>
            <div id="batchResult" style="margin-top:12px; font-size:0.9rem;"></div>
        </div>
    </div>
</div>
