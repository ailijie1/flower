<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌸 花园世界 · 公会花册 Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- JSZip 用于解压 zip 文件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            padding: 20px 16px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .container {
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 28px 22px;
            border-radius: 48px 24px 48px 24px;
            box-shadow: 0 20px 40px rgba(30, 60, 20, 0.12);
            border: 1px solid rgba(160, 200, 120, 0.3);
        }
        h1 {
            color: #2e5a1e;
            text-align: center;
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .subtitle {
            text-align: center;
            color: #5a7e4a;
            margin-bottom: 20px;
            font-size: 0.95rem;
            border-bottom: 1px dashed #a4c28e;
            padding-bottom: 14px;
        }
        .auth-container {
            max-width: 400px;
            margin: 0 auto;
        }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            background: rgba(230, 245, 210, 0.6);
            padding: 5px;
            border-radius: 50px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #3a5e2a;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .auth-tab.active {
            background: #3a7a2e;
            color: white;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .auth-input {
            padding: 14px 18px;
            border: 1.5px solid #b8daa0;
            border-radius: 40px;
            font-size: 1rem;
            background: white;
            outline: none;
        }
        .auth-input:focus {
            border-color: #3a7a2e;
            box-shadow: 0 0 0 3px rgba(58,122,46,0.1);
        }
        .auth-btn {
            padding: 14px;
            background: #3a7a2e;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 0 #245218;
            transition: 0.1s;
            font-size: 1.1rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 16px;
            color: #5a7e4a;
            font-size: 0.9rem;
        }
        .error-message {
            color: #d32f2f;
            text-align: center;
            font-size: 0.9rem;
            min-height: 24px;
        }
        .success-message {
            color: #2e7d32;
            text-align: center;
            font-size: 0.9rem;
            min-height: 24px;
        }
        .app-container {
            display: none;
        }
        .user-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding: 8px 12px 8px 16px;
            background: rgba(230, 245, 210, 0.5);
            border-radius: 50px;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 4px 12px 4px 4px;
            border-radius: 40px;
            background: rgba(255,255,255,0.3);
            transition: 0.2s;
        }
        .user-profile:hover {
            background: rgba(255,255,255,0.6);
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a7a2e, #5a9e4a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .user-name {
            font-weight: 600;
            color: #2e5a1e;
        }
        .user-name i {
            margin-left: 4px;
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .logout-btn {
            padding: 8px 16px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 18px;
            background: rgba(230, 245, 210, 0.6);
            padding: 5px;
            border-radius: 50px;
        }
        .query-btn {
            padding: 10px 24px;
            border: none;
            background: transparent;
            color: #3a5e2a;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .query-btn.active {
            background: #3a7a2e;
            color: white;
        }
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            background: white;
            padding: 6px 6px 6px 18px;
            border-radius: 50px;
            border: 1.5px solid #b8daa0;
        }
        #searchInput {
            flex: 1;
            padding: 12px 6px 12px 0;
            border: none;
            background: transparent;
            font-size: 1rem;
            outline: none;
        }
        #searchBtn {
            padding: 12px 24px;
            background: #3a7a2e;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 0 #245218;
        }
        .stats-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }
        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #f0f8ea, #e0efd5);
            padding: 16px 6px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #bdd8ae;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #1e5a1e;
        }
        .stat-label {
            font-size: 0.85rem;
            color: #5a7e4a;
        }
        .result-area {
            min-height: 160px;
            padding: 16px 12px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            border: 1px solid #cde0bd;
            margin-bottom: 18px;
        }
        .flower-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .flower-card {
            background: linear-gradient(135deg, #f6fff0, #eaf5e2);
            padding: 12px 6px;
            text-align: center;
            border-radius: 20px;
            border: 1px solid #bdd8ae;
            font-size: 0.9rem;
            color: #1e4a1e;
        }
        .member-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
        }
        .member-tag {
            background: #e0f0d0;
            padding: 6px 16px;
            border-radius: 30px;
            color: #1e4a1e;
            border: 1px solid #a0c090;
        }
        .collapsible {
            margin-top: 16px;
            border-top: 1px dashed #a4c28e;
            padding-top: 16px;
        }
        .collapse-header {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: #2e5a1e;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 8px 0;
        }
        .collapse-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .collapse-content.open {
            max-height: 400px;
            overflow-y: auto;
        }
        .form-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .form-input {
            flex: 1;
            min-width: 140px;
            padding: 12px 16px;
            border: 1.5px solid #b8daa0;
            border-radius: 40px;
            background: white;
        }
        .add-btn {
            padding: 12px 24px;
            background: #e68900;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 0 #b26500;
        }
        .library-btn {
            padding: 8px 16px;
            background: #9c27b0;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 0 #6a1b9a;
            font-size: 0.8rem;
        }
        .sync-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
            color: #3e6a2e;
            font-size: 0.9rem;
        }
        .refresh-btn {
            padding: 8px 18px;
            background: #6f9e4c;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 0 #3e6925;
        }
        .log-list {
            list-style: none;
            padding: 8px 0;
        }
        .log-item {
            padding: 10px 0;
            border-bottom: 1px solid #d0e0c0;
            display: flex;
            gap: 10px;
            font-size: 0.9rem;
            color: #2e4a1e;
        }
        .log-time {
            color: #7f9f6b;
            min-width: 65px;
        }
        .log-operator {
            font-weight: 600;
            color: #3a7a2e;
        }
        .footer {
            text-align: center;
            color: #6b8a58;
            font-size: 0.8rem;
            margin-top: 20px;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal {
            background: white;
            max-width: 500px;
            width: 100%;
            max-height: 70vh;
            border-radius: 32px;
            overflow: hidden;
        }
        .modal-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2e5a1e;
        }
        .modal-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .modal-body {
            padding: 20px 24px;
            max-height: 50vh;
            overflow-y: auto;
        }
        .flower-tag {
            display: inline-block;
            background: #3a7a2e;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            margin: 4px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .flower-tag.selected {
            background: #e68900;
        }
        #libraryStatus {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #5a7e4a;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 登录界面 -->
    <div id="authContainer" class="auth-container">
        <h1>🌸 花园世界</h1>
        <p class="subtitle">公会专属 · 登录后使用</p>
        <div class="auth-tabs">
            <button class="auth-tab active" id="loginTab">登录</button>
            <button class="auth-tab" id="registerTab">注册</button>
        </div>
        <div id="loginForm" class="auth-form">
            <input type="email" id="loginEmail" class="auth-input" placeholder="邮箱">
            <input type="password" id="loginPassword" class="auth-input" placeholder="密码">
            <div id="loginError" class="error-message"></div>
            <button class="auth-btn" id="loginBtn">登录</button>
        </div>
        <div id="registerForm" class="auth-form" style="display:none;">
            <input type="email" id="registerEmail" class="auth-input" placeholder="邮箱">
            <input type="password" id="registerPassword" class="auth-input" placeholder="密码（至少6位）">
            <input type="text" id="inviteCode" class="auth-input" placeholder="邀请码">
            <div id="registerError" class="error-message"></div>
            <div id="registerSuccess" class="success-message"></div>
            <button class="auth-btn" id="registerBtn">注册</button>
        </div>
        <p class="auth-footer">🌱 需要邀请码？请联系公会管理员</p>
    </div>

    <!-- 主应用 -->
    <div id="appContainer" class="app-container">
        <div class="user-bar">
            <div class="user-profile" id="userProfile">
                <div class="user-avatar" id="userAvatar">🌸</div>
                <span class="user-name" id="userName">花友 <i class="fas fa-pencil-alt"></i></span>
            </div>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>

        <div class="btn-group">
            <button class="query-btn active" id="byMemberBtn"><i class="fas fa-user"></i> 查成员</button>
            <button class="query-btn" id="byFlowerBtn"><i class="fas fa-flower"></i> 查花卉</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入成员名字…">
            <button id="searchBtn"><i class="fas fa-search"></i> 查询</button>
        </div>

        <div class="stats-row">
            <div class="stat-card" id="memberStatsCard">
                <div class="stat-number" id="totalMembers">0</div>
                <div class="stat-label">总成员 <i class="fas fa-chevron-right"></i></div>
            </div>
            <div class="stat-card" id="flowerStatsCard">
                <div class="stat-number" id="totalFlowers">0</div>
                <div class="stat-label">花卉种类 <i class="fas fa-chevron-right"></i></div>
            </div>
        </div>

        <div id="resultArea" class="result-area">
            <div style="color:#5a7e4a; text-align:center; padding:20px;">
                <i class="fas fa-hand-pointer"></i> 输入关键词查询
            </div>
        </div>

        <div class="collapsible">
            <div class="collapse-header" onclick="toggleCollapse('addPanel')">
                <i class="fas fa-plus-circle" style="color:#e68900;"></i> 添加花卉记录
                <button class="library-btn" onclick="event.stopPropagation(); openLibraryModal()">
                    <i class="fas fa-book"></i> 图鉴
                </button>
                <button class="ocr-btn" onclick="event.stopPropagation(); openMatchModal()" style="background:#2196f3; padding:8px 16px; border-radius:40px; border:none; color:white; font-weight:600; cursor:pointer; box-shadow:0 4px 0 #1565c0; font-size:0.8rem; margin-left:6px;">
                    <i class="fas fa-camera"></i> 匹配
                </button>
                <i class="fas fa-chevron-down" id="addIcon" style="margin-left:auto;"></i>
            </div>
            <div id="addPanel" class="collapse-content">
                <div class="form-row">
                    <input type="text" id="newMemberName" class="form-input" placeholder="成员名字">
                    <input type="text" id="newFlowerName" class="form-input" placeholder="花卉名称">
                    <button class="add-btn" id="addRecordBtn"><i class="fas fa-cloud-upload-alt"></i> 添加</button>
                </div>
            </div>
        </div>

        <div class="collapsible">
            <div class="collapse-header" onclick="toggleCollapse('logPanel')">
                <i class="fas fa-history" style="color:#6f9e4c;"></i> 云端更新日志
                <i class="fas fa-chevron-down" id="logIcon" style="margin-left:auto;"></i>
            </div>
            <div id="logPanel" class="collapse-content">
                <div style="display:flex; justify-content:flex-end; margin-bottom:8px;">
                    <button class="refresh-btn" style="padding:4px 12px;" onclick="event.stopPropagation(); loadCloudLogs()">
                        <i class="fas fa-sync-alt"></i> 刷新
                    </button>
                </div>
                <ul class="log-list" id="logList"></ul>
            </div>
        </div>

        <div class="sync-status">
            <span id="syncMessage"><i class="fas fa-sync fa-spin"></i> 连接中</span>
            <button class="refresh-btn" id="refreshDataBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
        </div>

        <p class="footer"><i class="fas fa-lock"></i> 仅限公会成员</p>
    </div>
</div>

<!-- 图鉴库管理弹窗 -->
<div class="modal-overlay" id="libraryModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title"><i class="fas fa-book"></i> 花卉图鉴库</span>
            <button class="modal-close" onclick="closeLibraryModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <p style="margin-bottom:16px;">上传包含花卉截图的 ZIP 文件，文件名即花名。</p>
            <input type="file" id="libraryZipInput" accept=".zip" style="display:none;">
            <button class="modal-btn" onclick="document.getElementById('libraryZipInput').click()" style="background:#9c27b0;">
                <i class="fas fa-upload"></i> 上传图鉴库 (ZIP)
            </button>
            <div id="libraryStatus"></div>
            <div id="libraryCount" style="margin-top:12px; font-weight:600;"></div>
        </div>
    </div>
</div>

<!-- 图像匹配识别弹窗 -->
<div class="modal-overlay" id="matchModal">
    <div class="modal" style="max-width:600px;">
        <div class="modal-header">
            <span class="modal-title"><i class="fas fa-search"></i> 图鉴匹配识别</span>
            <button class="modal-close" onclick="closeMatchModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <p style="margin-bottom:16px;">上传游戏截图，自动匹配图鉴库中的花卉。</p>
            <input type="file" id="screenshotInput" accept="image/*" style="display:none;">
            <button class="modal-btn" onclick="document.getElementById('screenshotInput').click()" style="background:#2196f3;">
                <i class="fas fa-image"></i> 选择截图
            </button>
            <img id="screenshotPreview" style="max-width:100%; max-height:200px; margin:16px 0; display:none; border-radius:12px;">
            <div id="matchLoading" style="display:none; text-align:center; padding:20px;">
                <i class="fas fa-spinner fa-spin"></i> 正在匹配...
            </div>
            <div id="matchResult"></div>
            <div id="matchedFlowers" style="margin-top:16px;"></div>
            <button class="modal-btn" id="importMatchedBtn" onclick="importMatchedFlowers()" style="display:none; margin-top:16px;">
                <i class="fas fa-download"></i> 导入选中花卉
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function(){
        const SUPABASE_URL = "https://amngvhgusyipxnnkejzp.supabase.co";
        const SUPABASE_KEY = "sb_publishable_yIYNCHcT4Z0z-NMcKVmjTQ_6SoHyxwZ";
        const INVITE_CODE = "XIAOGUO521";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let flowerData = [];
        let queryMode = 'member';
        let currentRecordId = 1;
        let currentUser = null;
        let currentNickname = '花友';
        let flowerLibrary = new Map(); // 图鉴库：花名 -> Image对象
        let matchedFlowers = [];
        let selectedMatchedFlowers = new Set();

        // DOM
        const authContainer = document.getElementById('authContainer');
        const appContainer = document.getElementById('appContainer');
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userNameSpan = document.getElementById('userName');
        const userAvatar = document.getElementById('userAvatar');
        const libraryModal = document.getElementById('libraryModal');
        const libraryStatus = document.getElementById('libraryStatus');
        const libraryCount = document.getElementById('libraryCount');
        const matchModal = document.getElementById('matchModal');
        const screenshotPreview = document.getElementById('screenshotPreview');
        const matchLoading = document.getElementById('matchLoading');
        const matchResult = document.getElementById('matchResult');
        const matchedFlowersDiv = document.getElementById('matchedFlowers');
        const importMatchedBtn = document.getElementById('importMatchedBtn');

        // 通用
        function getAvatarText(name) { return name ? name.charAt(0).toUpperCase() : '🌸'; }
        function updateUserUI(nickname) { currentNickname = nickname || '花友'; userNameSpan.innerHTML = `${currentNickname} <i class="fas fa-pencil-alt"></i>`; userAvatar.textContent = getAvatarText(currentNickname); }

        async function getUserProfile(userId) {
            const { data } = await supabase.from('profiles').select('nickname').eq('id', userId).single();
            data ? updateUserUI(data.nickname) : updateUserUI('花友');
        }

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if(session) { currentUser = session.user; await getUserProfile(session.user.id); showApp(); }
            else { showAuth(); }
        }
        function showAuth() { authContainer.style.display = 'block'; appContainer.style.display = 'none'; }
        function showApp() { authContainer.style.display = 'none'; appContainer.style.display = 'block'; loadData(); }

        loginBtn.onclick = async ()=>{
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            if(!email||!password) { errorDiv.textContent='请填写完整'; return; }
            errorDiv.textContent=''; loginBtn.textContent='登录中...'; loginBtn.disabled=true;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            loginBtn.textContent='登录'; loginBtn.disabled=false;
            error ? errorDiv.textContent = '邮箱或密码错误' : (currentUser = data.user, await getUserProfile(data.user.id), showApp());
        };

        registerBtn.onclick = async ()=>{
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const inviteCode = document.getElementById('inviteCode').value.trim();
            const errorDiv = document.getElementById('registerError');
            if(!email||!password||!inviteCode) { errorDiv.textContent='请填写所有字段'; return; }
            if(password.length<6) { errorDiv.textContent='密码至少6位'; return; }
            if(inviteCode !== INVITE_CODE) { errorDiv.textContent='邀请码错误'; return; }
            errorDiv.textContent=''; registerBtn.textContent='注册中...'; registerBtn.disabled=true;
            const { error } = await supabase.auth.signUp({ email, password });
            registerBtn.textContent='注册'; registerBtn.disabled=false;
            if(error) { errorDiv.textContent = error.message; }
            else { document.getElementById('registerSuccess').textContent='注册成功！请登录'; setTimeout(()=>loginTab.click(),1500); }
        };

        logoutBtn.onclick = async ()=>{ await supabase.auth.signOut(); showAuth(); };
        loginTab.onclick = ()=>{ loginTab.classList.add('active'); registerTab.classList.remove('active'); document.getElementById('loginForm').style.display='flex'; document.getElementById('registerForm').style.display='none'; };
        registerTab.onclick = ()=>{ registerTab.classList.add('active'); loginTab.classList.remove('active'); document.getElementById('registerForm').style.display='flex'; document.getElementById('loginForm').style.display='none'; };

        // 花卉系统
        const byMemberBtn = document.getElementById('byMemberBtn');
        const byFlowerBtn = document.getElementById('byFlowerBtn');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultArea = document.getElementById('resultArea');
        const addRecordBtn = document.getElementById('addRecordBtn');
        const newMemberName = document.getElementById('newMemberName');
        const newFlowerName = document.getElementById('newFlowerName');
        const syncMessage = document.getElementById('syncMessage');
        const refreshDataBtn = document.getElementById('refreshDataBtn');
        const totalMembersSpan = document.getElementById('totalMembers');
        const totalFlowersSpan = document.getElementById('totalFlowers');
        const logList = document.getElementById('logList');

        async function addCloudLog(action, memberName=null, flowerName=null) {
            try { await fetch(`${SUPABASE_URL}/rest/v1/flower_logs`, { method:'POST', headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"}, body:JSON.stringify({action, member_name:memberName, flower_name:flowerName, operator:currentNickname}) }); } catch(e){}
        }

        async function loadCloudLogs() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/flower_logs?select=*&order=created_at.desc&limit=30`, { headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`} });
                const logs = await res.json();
                logList.innerHTML = logs.length ? logs.map(log=>{
                    const time = new Date(log.created_at).toLocaleTimeString('zh-CN',{hour12:false,hour:'2-digit',minute:'2-digit'});
                    return `<li class="log-item"><span class="log-time">${time}</span> <span class="log-operator">${log.operator||'未知'}</span> ${log.action}${log.member_name?'：'+log.member_name:''}${log.flower_name?' → '+log.flower_name:''}</li>`;
                }).join('') : '<li class="log-item">暂无日志</li>';
            } catch(e) {}
        }

        function updateStats() {
            totalMembersSpan.textContent = flowerData.length;
            totalFlowersSpan.textContent = new Set(flowerData.flatMap(m=>m.flowers)).size;
        }

        async function loadData() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/flowers?select=*`, { headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`} });
                const records = await res.json();
                if(records.length) { currentRecordId = records[0].id; flowerData = records[0].data || []; syncMessage.innerHTML = `✅ 云端 ${flowerData.length}位成员`; }
                updateStats();
            } catch(e) {}
        }

        async function saveToCloud() {
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/flowers?id=eq.${currentRecordId}`, { method:'PATCH', headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"}, body:JSON.stringify({data:flowerData}) });
                syncMessage.innerHTML = `✅ 已同步`; updateStats(); return true;
            } catch(e) { return false; }
        }

        function performSearch() {
            const kw = searchInput.value.trim(); if(!kw) return;
            if(queryMode==='member') {
                const m = flowerData.find(m=>m.name.includes(kw));
                resultArea.innerHTML = m ? `<div class="flower-grid">${m.flowers.map(f=>`<div class="flower-card">${f}</div>`).join('')}</div>` : '❌ 未找到';
            } else {
                const members = flowerData.filter(m=>m.flowers.some(f=>f.includes(kw)));
                resultArea.innerHTML = members.length ? `<div class="member-list">${members.map(m=>`<span class="member-tag">${m.name}</span>`).join('')}</div>` : '❌ 未找到';
            }
        }

        byMemberBtn.onclick = ()=>{ queryMode='member'; byMemberBtn.classList.add('active'); byFlowerBtn.classList.remove('active'); };
        byFlowerBtn.onclick = ()=>{ queryMode='flower'; byFlowerBtn.classList.add('active'); byMemberBtn.classList.remove('active'); };
        searchBtn.onclick = performSearch;
        searchInput.onkeydown = e => { if(e.key==='Enter') performSearch(); };

        addRecordBtn.onclick = async ()=>{
            const mName = newMemberName.value.trim(), fName = newFlowerName.value.trim();
            if(!mName||!fName) return;
            let member = flowerData.find(m=>m.name===mName);
            member ? member.flowers.push(fName) : flowerData.push({name:mName, flowers:[fName]});
            if(await saveToCloud()) { await addCloudLog('添加花卉', mName, fName); newMemberName.value=''; newFlowerName.value=''; }
        };

        refreshDataBtn.onclick = loadData;
        window.toggleCollapse = (id)=>{
            const panel = document.getElementById(id), icon = document.getElementById(id==='addPanel'?'addIcon':'logIcon');
            panel.classList.toggle('open'); icon.classList.toggle('fa-chevron-down'); icon.classList.toggle('fa-chevron-up');
            if(id==='logPanel' && panel.classList.contains('open')) loadCloudLogs();
        };

        // 图鉴库管理
        window.openLibraryModal = ()=> { libraryModal.style.display = 'flex'; };
        window.closeLibraryModal = ()=> libraryModal.style.display = 'none';

        document.getElementById('libraryZipInput').addEventListener('change', async (e)=>{
            const file = e.target.files[0];
            if(!file) return;
            libraryStatus.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在解压...';
            try {
                const zip = await JSZip.loadAsync(file);
                const imageFiles = Object.keys(zip.files).filter(f => f.match(/\.(png|jpg|jpeg)$/i) && !zip.files[f].dir);
                flowerLibrary.clear();
                for(const filename of imageFiles) {
                    const flowerName = filename.replace(/\.[^/.]+$/, "").replace(/.*[\\/]/, '');
                    const blob = await zip.files[filename].async('blob');
                    const img = new Image();
                    img.src = URL.createObjectURL(blob);
                    await new Promise(r=>{ img.onload = r; });
                    flowerLibrary.set(flowerName, img);
                }
                libraryStatus.innerHTML = '✅ 图鉴库加载成功！';
                libraryCount.innerHTML = `📚 已加载 ${flowerLibrary.size} 种花卉`;
                localStorage.setItem('flowerLibrary', JSON.stringify(Array.from(flowerLibrary.keys())));
            } catch(err) {
                libraryStatus.innerHTML = `❌ 加载失败: ${err.message}`;
            }
        });

        // 图像匹配
        window.openMatchModal = ()=>{ 
            if(flowerLibrary.size === 0) { alert('请先上传图鉴库'); return; }
            matchModal.style.display = 'flex'; 
            screenshotPreview.style.display = 'none';
            matchResult.innerHTML = '';
            matchedFlowersDiv.innerHTML = '';
            importMatchedBtn.style.display = 'none';
            selectedMatchedFlowers.clear();
        };
        window.closeMatchModal = ()=> matchModal.style.display = 'none';

        document.getElementById('screenshotInput').addEventListener('change', async (e)=>{
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = ev=>{ screenshotPreview.src = ev.target.result; screenshotPreview.style.display = 'block'; };
            reader.readAsDataURL(file);
            
            matchLoading.style.display = 'block';
            matchResult.innerHTML = '';
            
            const img = new Image();
            img.src = URL.createObjectURL(file);
            await new Promise(r=>{ img.onload = r; });
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            matchedFlowers = [];
            
            for(let [flowerName, templateImg] of flowerLibrary) {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                const templateWidth = templateImg.width;
                const templateHeight = templateImg.height;
                
                let bestMatch = 0;
                
                for(let y = 0; y <= img.height - templateHeight; y += 20) {
                    for(let x = 0; x <= img.width - templateWidth; x += 20) {
                        ctx.drawImage(templateImg, x, y);
                        const imageData = ctx.getImageData(x, y, templateWidth, templateHeight);
                        const templateData = ctx.getImageData(0, 0, templateWidth, templateHeight);
                        let match = 0;
                        for(let i = 0; i < imageData.data.length; i += 4) {
                            if(Math.abs(imageData.data[i] - templateData.data[i]) < 50) match++;
                        }
                        const similarity = match / (templateWidth * templateHeight);
                        if(similarity > bestMatch) bestMatch = similarity;
                        ctx.drawImage(img, 0, 0);
                    }
                }
                
                if(bestMatch > 0.3) {
                    matchedFlowers.push(flowerName);
                }
            }
            
            matchLoading.style.display = 'none';
            
            if(matchedFlowers.length > 0) {
                matchResult.innerHTML = `✅ 匹配到 ${matchedFlowers.length} 种花卉`;
                matchedFlowersDiv.innerHTML = matchedFlowers.map(f=>`<span class="flower-tag" onclick="toggleMatchedFlower('${f}')" id="match_${f}">${f}</span>`).join('');
                importMatchedBtn.style.display = 'block';
            } else {
                matchResult.innerHTML = '⚠️ 未匹配到任何花卉，请调整截图或扩充图鉴库';
            }
        });

        window.toggleMatchedFlower = function(f) {
            const el = document.getElementById(`match_${f}`);
            selectedMatchedFlowers.has(f) ? (selectedMatchedFlowers.delete(f), el.classList.remove('selected')) : (selectedMatchedFlowers.add(f), el.classList.add('selected'));
        };

        window.importMatchedFlowers = async function() {
            if(selectedMatchedFlowers.size === 0) { alert('请选择花卉'); return; }
            const memberName = prompt('这些花卉属于哪位成员？');
            if(!memberName) return;
            let member = flowerData.find(m=>m.name===memberName);
            const flowers = Array.from(selectedMatchedFlowers);
            member ? flowers.forEach(f=>{ if(!member.flowers.includes(f)) member.flowers.push(f); }) : flowerData.push({name:memberName, flowers});
            if(await saveToCloud()) { await addCloudLog('图鉴导入', memberName, flowers.join(',')); alert(`成功导入 ${flowers.length} 种花卉！`); closeMatchModal(); updateStats(); }
        };

        // 启动
        checkAuth();
        document.getElementById('addPanel').classList.add('open');
        document.getElementById('addIcon').classList.add('fa-chevron-up');
    })();
</script>
</body>
</html>
