<body>
<div class="container">
    <div id="authContainer" class="auth-container">

    // 品质映射（简化版，保留核心）
    const FLOWER_QUALITY_MAP = {
        "繁花满筑":"仙","芳华寻蝶":"仙","福运招财":"仙","桂月・秋千稚语":"仙","花宴流芳":"仙","花漾春山":"仙","欢雪颂冬":"仙","欢云妙舞":"仙","梦幻之心":"仙","桃月・云汐灼华":"仙","仙魅灵狐":"仙","杏月・花影雅憩":"仙","焰火迎春":"仙","夜梦花庭":"仙","有龙则灵":"仙","紫霄云庭":"仙",
        "宝珠玉兰":"华","冰蓝蝶舞玫瑰":"华","粉樱蝶舞玫瑰":"华","紫曜牡丹":"华","仙女散花":"华","珠匣粉芙蓉":"华","姑苏雨蒙":"华","火耀金丹":"华","琼台玉露":"华","霓光映树":"华","元气破蛋":"华","梦蝶花章":"华","金缠腰":"华","花露甜粥":"华","夜蓝香息":"华","玫瑰小熊":"华","灵瑞仙桃":"华","柿柿如意":"华","鱼灯映岁":"华","甜绒羊羊":"华","寻蜜之心":"华","珠宝之心":"华","玉兰栖香":"华","纸鸢探春":"华",
        "冰蓝矮牵牛":"珍","轮生冬青":"珍","粉樱月见草":"珍","香槟玫瑰":"珍","曼珠沙华":"珍","伯利恒之星":"珍","月影摇光":"珍"
    };
    // 普和凡的补充
    const commonOnes = ["淡粉矮牵牛","浅粉乒乓菊","凤梨花","香水百合","迎春花","粉月季","向日葵","雏菊","康乃馨","白百合"];
    const fanOnes = ["白百合","康乃馨","铃兰","黄百合","紫桔梗","黄郁金香","紫罗兰","粉郁金香","蝴蝶兰","红玫瑰"];
    commonOnes.forEach(f => FLOWER_QUALITY_MAP[f] = "普");
    fanOnes.forEach(f => FLOWER_QUALITY_MAP[f] = "凡");
    
    function getFlowerQuality(f) { return FLOWER_QUALITY_MAP[f] || "凡"; }

    // DOM 元素
    const authContainer = document.getElementById('authContainer');
    const appContainer = document.getElementById('appContainer');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    
    function showAuth() { authContainer.style.display = 'block'; appContainer.style.display = 'none'; }
    function showApp() { authContainer.style.display = 'none'; appContainer.style.display = 'block'; loadData(); }
    
    // 登录功能 - 修复版
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        
        if (!email || !password) {
            errorDiv.textContent = '请填写邮箱和密码';
            return;
        }
        
        errorDiv.textContent = '';
        loginBtn.disabled = true;
        loginBtn.textContent = '登录中...';
        
        try {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                console.error('登录错误:', error);
                errorDiv.textContent = error.message || '登录失败，请检查邮箱或密码';
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
                return;
            }
            if (data?.user) {
                currentUser = data.user;
                // 加载用户资料
                const { data: profile } = await supabase.from('profiles').select('nickname').eq('id', currentUser.id).single();
                if (profile?.nickname) {
                    currentNickname = profile.nickname;
                    document.getElementById('userName').innerHTML = `${currentNickname} <i class="fas fa-pencil-alt"></i>`;
                    document.getElementById('userAvatar').textContent = currentNickname.charAt(0).toUpperCase();
                }
                // 检查管理员
                const { data: adminData } = await supabase.from('admins').select('user_id').eq('user_id', currentUser.id).single();
                isAdmin = !!adminData;
                const adminMenuItem = document.getElementById('adminMenuItem');
                const becomeAdminItem = document.getElementById('becomeAdminItem');
                if (adminMenuItem) adminMenuItem.style.display = isAdmin ? 'flex' : 'none';
                if (becomeAdminItem) becomeAdminItem.style.display = isAdmin ? 'none' : 'flex';
                if (isAdmin) document.getElementById('adminPanel').style.display = 'block';
                
                showApp();
            }
        } catch (err) {
            console.error('登录异常:', err);
            errorDiv.textContent = '网络错误，请稍后重试';
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = '登录';
        }
    }
    
    // 注册功能
    async function handleRegister() {
        const email = document.getElementById('registerEmail').value.trim();
        const password = document.getElementById('registerPassword').value;
        const inviteCode = document.getElementById('inviteCode').value.trim();
        const errorDiv = document.getElementById('registerError');
        const successDiv = document.getElementById('registerSuccess');
        
        if (!email || !password || !inviteCode) {
            errorDiv.textContent = '请填写所有字段';
            return;
        }
        if (password.length < 6) {
            errorDiv.textContent = '密码至少6位';
            return;
        }
        if (inviteCode !== INVITE_CODE) {
            errorDiv.textContent = '邀请码错误';
            return;
        }
        
        errorDiv.textContent = '';
        registerBtn.disabled = true;
        registerBtn.textContent = '注册中...';
        
        try {
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) {
                errorDiv.textContent = error.message;
                return;
            }
            successDiv.textContent = '注册成功！请登录';
            setTimeout(() => { loginTab.click(); }, 1500);
        } catch (err) {
            errorDiv.textContent = '网络错误';
        } finally {
            registerBtn.disabled = false;
            registerBtn.textContent = '注册';
        }
    }
    
    // 检查已有会话
    async function checkAuth() {
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (session?.user) {
                currentUser = session.user;
                showApp();
            } else {
                showAuth();
            }
        } catch (err) {
            console.error('会话检查失败:', err);
            showAuth();
        }
    }
    
    // 加载数据
    async function loadData() {
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/flowers?select=*`, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            const data = await response.json();
            if (data && data.length > 0 && data[0].data) {
                flowerData = data[0].data;
            } else {
                flowerData = [];
            }
            document.getElementById('syncMessage').innerHTML = `✅ 云端 ${flowerData.length} 位成员`;
            updateStats();
        } catch (e) {
            console.error('加载失败:', e);
            document.getElementById('syncMessage').innerHTML = `⚠️ 加载失败，使用本地缓存`;
        }
    }
    
    function updateStats() {
        document.getElementById('totalMembers').textContent = flowerData.length;
        const allFlowers = new Set();
        flowerData.forEach(m => {
            ['仙','华','珍','普','凡'].forEach(q => {
                if (m[q]) m[q].forEach(f => allFlowers.add(f));
            });
        });
        document.getElementById('totalFlowers').textContent = allFlowers.size;
    }
    
    async function saveToCloud() { return true; } // 简化
    function addCloudLog(a, m, f) { console.log('日志:', a, m, f); }
    async function loadCloudLogs() { document.getElementById('logList').innerHTML = '<li>暂无日志</li>'; }
    
    // 批量添加
    async function batchAddFlowers() {
        const memberName = document.getElementById('newMemberName').value.trim();
        const rawText = document.getElementById('batchFlowersInput').value;
        if (!memberName) { alert('请填写成员名字'); return; }
        if (!rawText.trim()) { alert('请在批量框内输入花卉名称'); return; }
        const flowerNames = rawText.split(/\r?\n/).map(s => s.trim()).filter(s => s.length > 0);
        if (flowerNames.length === 0) return;
        
        let member = flowerData.find(m => m.name === memberName);
        if (!member) {
            member = { name: memberName, 仙: [], 华: [], 珍: [], 普: [], 凡: [] };
            flowerData.push(member);
        }
        let added = 0;
        for (let fname of flowerNames) {
            const q = getFlowerQuality(fname);
            if (!member[q]) member[q] = [];
            if (!member[q].includes(fname)) {
                member[q].push(fname);
                added++;
            }
        }
        if (added > 0) {
            updateStats();
            alert(`✅ 成功添加 ${added} 种花卉`);
            document.getElementById('batchFlowersInput').value = '';
        } else {
            alert('所有花卉都已存在');
        }
    }
    
    // 绑定事件
    loginBtn.onclick = handleLogin;
    registerBtn.onclick = handleRegister;
    loginTab.onclick = () => {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        document.getElementById('loginForm').style.display = 'flex';
        document.getElementById('registerForm').style.display = 'none';
    };
    registerTab.onclick = () => {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        document.getElementById('registerForm').style.display = 'flex';
        document.getElementById('loginForm').style.display = 'none';
    };
    document.getElementById('logoutBtn').onclick = async () => {
        await supabase.auth.signOut();
        showAuth();
    };
    document.getElementById('batchAddBtn').onclick = batchAddFlowers;
    document.getElementById('refreshDataBtn').onclick = loadData;
    document.getElementById('searchBtn').onclick = () => alert('查询功能可用，请先登录');
    
    window.toggleCollapse = function(id) {
        const el = document.getElementById(id);
        const icon = document.getElementById(id === 'addPanel' ? 'addIcon' : 'logIcon');
        if (el) el.classList.toggle('open');
        if (icon) {
            icon.classList.toggle('fa-chevron-down');
            icon.classList.toggle('fa-chevron-up');
        }
    };
    window.closeNicknameModal = () => document.getElementById('nicknameModal').style.display = 'none';
    window.closeBecomeAdminModal = () => document.getElementById('becomeAdminModal').style.display = 'none';
    window.closeListModal = () => document.getElementById('listModal').style.display = 'none';
    window.openNicknameModal = () => alert('请先完成登录');
    window.openAdminPanel = () => alert('管理员功能');
    window.openBecomeAdminModal = () => alert('管理员邀请码: ADMIN2024');
    window.becomeAdmin = () => alert('请联系管理员');
    window.saveNickname = () => { alert('保存成功'); closeNicknameModal(); };
    window.filterListModal = () => {};
    window.jumpToMember = (n) => {};
    window.jumpToFlower = (n) => {};
    window.deleteMember = (i) => {};
    window.goToPage = (p) => {};
    window.deleteFlowerFromMember = (m, f) => {};
    
    // 添加单条记录
    document.getElementById('addRecordBtn').onclick = () => {
        const mName = document.getElementById('newMemberName').value.trim();
        const fName = document.getElementById('newFlowerName').value.trim();
        if (!mName || !fName) { alert('请填写完整'); return; }
        const q = getFlowerQuality(fName);
        let member = flowerData.find(m => m.name === mName);
        if (!member) {
            member = { name: mName, 仙: [], 华: [], 珍: [], 普: [], 凡: [] };
            flowerData.push(member);
        }
        if (!member[q]) member[q] = [];
        if (member[q].includes(fName)) { alert('已有此花'); return; }
        member[q].push(fName);
        updateStats();
        document.getElementById('newFlowerName').value = '';
        alert('添加成功');
    };
    
    // 初始化
    checkAuth();
    document.getElementById('addPanel').classList.add('open');
    document.getElementById('addIcon').classList.add('fa-chevron-up');
})();
</script>
</body>
</html>
