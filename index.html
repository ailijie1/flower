<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌸 花园世界 · 公会花册</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            padding: 20px 16px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .container {
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 28px 22px;
            border-radius: 48px 24px 48px 24px;
            box-shadow: 0 20px 40px rgba(30, 60, 20, 0.12);
            border: 1px solid rgba(160, 200, 120, 0.3);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }
        h1 {
            color: #2e5a1e;
            text-align: center;
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .subtitle {
            text-align: center;
            color: #5a7e4a;
            margin-bottom: 20px;
            font-size: 0.95rem;
            border-bottom: 1px dashed #a4c28e;
            padding-bottom: 14px;
        }
        .auth-container {
            max-width: 400px;
            margin: 0 auto;
        }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            background: rgba(230, 245, 210, 0.6);
            padding: 5px;
            border-radius: 50px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #3a5e2a;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .auth-tab.active {
            background: #3a7a2e;
            color: white;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .auth-input {
            padding: 14px 18px;
            border: 1.5px solid #b8daa0;
            border-radius: 40px;
            font-size: 1rem;
            background: white;
            outline: none;
        }
        .auth-input:focus {
            border-color: #3a7a2e;
            box-shadow: 0 0 0 3px rgba(58,122,46,0.1);
        }
        .auth-btn {
            padding: 14px;
            background: #3a7a2e;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 0 #245218;
            transition: 0.1s;
            font-size: 1.1rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 16px;
            color: #5a7e4a;
            font-size: 0.9rem;
        }
        .error-message { color: #d32f2f; text-align: center; font-size: 0.9rem; min-height: 24px; }
        .success-message { color: #2e7d32; text-align: center; font-size: 0.9rem; min-height: 24px; }
        .app-container { display: none; }
        .user-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding: 8px 12px 8px 16px;
            background: rgba(230, 245, 210, 0.5);
            border-radius: 50px;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 4px 12px 4px 4px;
            border-radius: 40px;
            background: rgba(255,255,255,0.3);
            transition: 0.2s;
        }
        .user-profile:hover { background: rgba(255,255,255,0.6); }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a7a2e, #5a9e4a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .user-name {
            font-weight: 600;
            color: #2e5a1e;
        }
        .user-name i { margin-left: 4px; font-size: 0.7rem; opacity: 0.7; }
        .logout-btn {
            padding: 8px 16px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 18px;
            background: rgba(230, 245, 210, 0.6);
            padding: 5px;
            border-radius: 50px;
        }
        .query-btn {
            padding: 10px 24px;
            border: none;
            background: transparent;
            color: #3a5e2a;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .query-btn.active { background: #3a7a2e; color: white; }
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            background: white;
            padding: 6px 6px 6px 18px;
            border-radius: 50px;
            border: 1.5px solid #b8daa0;
        }
        #searchInput {
            flex: 1;
            padding: 12px 6px 12px 0;
            border: none;
            background: transparent;
            font-size: 1rem;
            outline: none;
        }
        #searchBtn {
            padding: 12px 24px;
            background: #3a7a2e;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 0 #245218;
        }
        .stats-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }
        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #f0f8ea, #e0efd5);
            padding: 16px 6px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #bdd8ae;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-number { font-size: 2rem; font-weight: 700; color: #1e5a1e; }
        .stat-label { font-size: 0.85rem; color: #5a7e4a; }
        
        /* 品质筛选标签 */
        .filter-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .filter-tab {
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
            background: #f0f0f0;
            color: #555;
        }
        .filter-tab.active { opacity: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .filter-tab.all { background: #6b8a58; color: white; }
        .filter-tab.xian { background: #e53935; color: white; }
        .filter-tab.hua { background: #f9a825; color: white; }
        .filter-tab.zhen { background: #8e24aa; color: white; }
        .filter-tab.pu { background: #1e88e5; color: white; }
        .filter-tab.fan { background: #43a047; color: white; }
        
        .result-area {
            min-height: 160px;
            padding: 16px 12px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            border: 1px solid #cde0bd;
            margin-bottom: 18px;
        }
        .flower-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .flower-card {
            padding: 12px 6px;
            text-align: center;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            word-break: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .flower-card.xian { background: linear-gradient(135deg, #ffebee, #ffcdd2); border: 1px solid #e53935; color: #b71c1c; }
        .flower-card.hua { background: linear-gradient(135deg, #fff8e1, #ffecb3); border: 1px solid #f9a825; color: #e65100; }
        .flower-card.zhen { background: linear-gradient(135deg, #f3e5f5, #e1bee7); border: 1px solid #8e24aa; color: #4a148c; }
        .flower-card.pu { background: linear-gradient(135deg, #e3f2fd, #bbdefb); border: 1px solid #1e88e5; color: #0d47a1; }
        .flower-card.fan { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border: 1px solid #43a047; color: #1b5e20; }
        
        .member-list { display: flex; flex-wrap: wrap; gap: 8px 12px; }
        .member-tag {
            background: #e0f0d0;
            padding: 6px 16px;
            border-radius: 30px;
            color: #1e4a1e;
            border: 1px solid #a0c090;
            cursor: pointer;
            transition: 0.2s;
        }
        .member-tag:hover { background: #c8e0b8; }
        .collapsible {
            margin-top: 16px;
            border-top: 1px dashed #a4c28e;
            padding-top: 16px;
        }
        .collapse-header {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: #2e5a1e;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 8px 0;
        }
        .collapse-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .collapse-content.open { max-height: 400px; overflow-y: auto; }
        .form-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .form-input {
            flex: 1;
            min-width: 140px;
            padding: 12px 16px;
            border: 1.5px solid #b8daa0;
            border-radius: 40px;
            background: white;
        }
        .add-btn {
            padding: 12px 24px;
            background: #e68900;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 0 #b26500;
        }
        .sync-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
            color: #3e6a2e;
            font-size: 0.9rem;
        }
        .refresh-btn {
            padding: 8px 18px;
            background: #6f9e4c;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 0 #3e6925;
        }
        .footer { text-align: center; color: #6b8a58; font-size: 0.8rem; margin-top: 20px; }
        
        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal {
            background: white;
            max-width: 500px;
            width: 100%;
            max-height: 70vh;
            border-radius: 32px;
            overflow: hidden;
        }
        .modal-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-title { font-size: 1.3rem; font-weight: 700; color: #2e5a1e; }
        .modal-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .modal-body { padding: 20px 24px; max-height: 50vh; overflow-y: auto; }
        .modal-search {
            padding: 12px 16px;
            border: 1.5px solid #b8daa0;
            border-radius: 30px;
            width: 100%;
            margin-bottom: 16px;
            outline: none;
        }
        .modal-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #e0efd5;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.15s;
        }
        .modal-list-item:hover { background: #f0f8ea; }
        .modal-item-name { font-weight: 500; color: #1e4a1e; }
        .modal-item-badge {
            background: #3a7a2e;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .modal-input {
            padding: 14px 18px;
            border: 1.5px solid #b8daa0;
            border-radius: 40px;
            width: 100%;
            margin-bottom: 16px;
        }
        .modal-btn {
            padding: 14px;
            background: #3a7a2e;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }
        @media (max-width: 480px) {
            .flower-grid { grid-template-columns: repeat(2, 1fr); }
            .container { padding: 20px 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="authContainer" class="auth-container">
        <h1>🌸 花园世界</h1>
        <p class="subtitle">公会专属 · 登录后使用</p>
        <div class="auth-tabs">
            <button class="auth-tab active" id="loginTab">登录</button>
            <button class="auth-tab" id="registerTab">注册</button>
        </div>
        <div id="loginForm" class="auth-form">
            <input type="email" id="loginEmail" class="auth-input" placeholder="邮箱">
            <input type="password" id="loginPassword" class="auth-input" placeholder="密码">
            <div id="loginError" class="error-message"></div>
            <button class="auth-btn" id="loginBtn">登录</button>
        </div>
        <div id="registerForm" class="auth-form" style="display:none;">
            <input type="email" id="registerEmail" class="auth-input" placeholder="邮箱">
            <input type="password" id="registerPassword" class="auth-input" placeholder="密码（至少6位）">
            <input type="text" id="inviteCode" class="auth-input" placeholder="邀请码">
            <div id="registerError" class="error-message"></div>
            <div id="registerSuccess" class="success-message"></div>
            <button class="auth-btn" id="registerBtn">注册</button>
        </div>
        <p class="auth-footer">🌱 需要邀请码？请联系公会管理员</p>
    </div>

    <div id="appContainer" class="app-container">
        <div class="user-bar">
            <div class="user-profile" id="userProfile">
                <div class="user-avatar" id="userAvatar">🌸</div>
                <span class="user-name" id="userName">花友 <i class="fas fa-pencil-alt"></i></span>
            </div>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>

        <div class="btn-group">
            <button class="query-btn active" id="byMemberBtn"><i class="fas fa-user"></i> 查成员</button>
            <button class="query-btn" id="byFlowerBtn"><i class="fas fa-flower"></i> 查花卉</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入成员名字…">
            <button id="searchBtn"><i class="fas fa-search"></i> 查询</button>
        </div>

        <div class="stats-row">
            <div class="stat-card" id="memberStatsCard">
                <div class="stat-number" id="totalMembers">0</div>
                <div class="stat-label">总成员 <i class="fas fa-chevron-right"></i></div>
            </div>
            <div class="stat-card" id="flowerStatsCard">
                <div class="stat-number" id="totalFlowers">0</div>
                <div class="stat-label">花卉种类 <i class="fas fa-chevron-right"></i></div>
            </div>
        </div>

        <div class="filter-tabs" id="filterTabs" style="display:none;">
            <button class="filter-tab all active" data-filter="all">全</button>
            <button class="filter-tab xian" data-filter="仙">仙</button>
            <button class="filter-tab hua" data-filter="华">华</button>
            <button class="filter-tab zhen" data-filter="珍">珍</button>
            <button class="filter-tab pu" data-filter="普">普</button>
            <button class="filter-tab fan" data-filter="凡">凡</button>
        </div>

        <div id="resultArea" class="result-area">
            <div style="color:#5a7e4a; text-align:center; padding:20px;">
                <i class="fas fa-hand-pointer"></i> 输入关键词查询
            </div>
        </div>

        <div class="collapsible">
            <div class="collapse-header" onclick="toggleCollapse('addPanel')">
                <i class="fas fa-plus-circle" style="color:#e68900;"></i> 添加花卉记录
                <i class="fas fa-chevron-down" id="addIcon" style="margin-left:auto;"></i>
            </div>
            <div id="addPanel" class="collapse-content">
                <div class="form-row">
                    <input type="text" id="newMemberName" class="form-input" placeholder="成员名字">
                    <input type="text" id="newFlowerName" class="form-input" placeholder="花卉名称">
                    <select id="newFlowerQuality" class="form-input" style="max-width:100px;">
                        <option value="仙">🔴 仙</option>
                        <option value="华">🟡 华</option>
                        <option value="珍">🟣 珍</option>
                        <option value="普">🔵 普</option>
                        <option value="凡" selected>🟢 凡</option>
                    </select>
                    <button class="add-btn" id="addRecordBtn"><i class="fas fa-cloud-upload-alt"></i> 添加</button>
                </div>
            </div>
        </div>

        <div class="sync-status">
            <span id="syncMessage"><i class="fas fa-sync fa-spin"></i> 连接中</span>
            <button class="refresh-btn" id="refreshDataBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
        </div>

        <p class="footer"><i class="fas fa-lock"></i> 仅限公会成员</p>
    </div>
</div>

<!-- 昵称修改弹窗 -->
<div class="modal-overlay" id="nicknameModal">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title"><i class="fas fa-user-edit"></i> 修改昵称</span>
            <button class="modal-close" onclick="closeNicknameModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <input type="text" id="nicknameInput" class="modal-input" placeholder="输入新昵称" maxlength="12">
            <button class="modal-btn" onclick="saveNickname()">保存</button>
        </div>
    </div>
</div>

<!-- 成员/花卉列表弹窗 -->
<div class="modal-overlay" id="listModal">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">

            <div id="listModalContainer"></div>
        </div>
    </div>
</div>

        const filterTabs = document.getElementById('filterTabs');
        const listModal = document.getElementById('listModal');
        const listModalTitle = document.getElementById('listModalTitle');
        const listModalContainer = document.getElementById('listModalContainer');
        const listModalSearch = document.getElementById('listModalSearch');

        function getAvatarText(name) { return name ? name.charAt(0).toUpperCase() : '🌸'; }
        function updateUserUI(nickname) { currentNickname = nickname || '花友'; userNameSpan.innerHTML = `${currentNickname} <i class="fas fa-pencil-alt"></i>`; userAvatar.textContent = getAvatarText(currentNickname); }

        async function getUserProfile(userId) {
            const { data } = await supabase.from('profiles').select('nickname').eq('id', userId).single();
            data ? updateUserUI(data.nickname) : updateUserUI('花友');
        }

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if(session) { currentUser = session.user; await getUserProfile(session.user.id); showApp(); }
            else { showAuth(); }
        }
        function showAuth() { authContainer.style.display = 'block'; appContainer.style.display = 'none'; }
        function showApp() { authContainer.style.display = 'none'; appContainer.style.display = 'block'; loadData(); }

        loginBtn.onclick = async ()=>{
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            if(!email||!password) { errorDiv.textContent='请填写完整'; return; }
            errorDiv.textContent=''; loginBtn.textContent='登录中...'; loginBtn.disabled=true;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            loginBtn.textContent='登录'; loginBtn.disabled=false;
            error ? errorDiv.textContent = '邮箱或密码错误' : (currentUser = data.user, await getUserProfile(data.user.id), showApp());
        };

        registerBtn.onclick = async ()=>{
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const inviteCode = document.getElementById('inviteCode').value.trim();
            const errorDiv = document.getElementById('registerError');
            if(!email||!password||!inviteCode) { errorDiv.textContent='请填写所有字段'; return; }
            if(password.length<6) { errorDiv.textContent='密码至少6位'; return; }
            if(inviteCode !== INVITE_CODE) { errorDiv.textContent='邀请码错误'; return; }
            errorDiv.textContent=''; registerBtn.textContent='注册中...'; registerBtn.disabled=true;
            const { error } = await supabase.auth.signUp({ email, password });
            registerBtn.textContent='注册'; registerBtn.disabled=false;
            if(error) { errorDiv.textContent = error.message; }
            else { document.getElementById('registerSuccess').textContent='注册成功！请登录'; setTimeout(()=>loginTab.click(),1500); }
        };

        logoutBtn.onclick = async ()=>{ await supabase.auth.signOut(); showAuth(); };
        loginTab.onclick = ()=>{ loginTab.classList.add('active'); registerTab.classList.remove('active'); document.getElementById('loginForm').style.display='flex'; document.getElementById('registerForm').style.display='none'; };
        registerTab.onclick = ()=>{ registerTab.classList.add('active'); loginTab.classList.remove('active'); document.getElementById('registerForm').style.display='flex'; document.getElementById('loginForm').style.display='none'; };

        document.getElementById('userProfile').onclick = ()=>{
            nicknameModal.style.display = 'flex';
            nicknameInput.value = currentNickname;
        };
        window.closeNicknameModal = ()=> nicknameModal.style.display = 'none';
        window.saveNickname = async ()=>{
            const nickname = nicknameInput.value.trim();
            if(!nickname) { alert('请输入昵称'); return; }
            await supabase.from('profiles').upsert({ id: currentUser.id, nickname });
            updateUserUI(nickname);
            closeNicknameModal();
        };

        const byMemberBtn = document.getElementById('byMemberBtn');
        const byFlowerBtn = document.getElementById('byFlowerBtn');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultArea = document.getElementById('resultArea');
        const addRecordBtn = document.getElementById('addRecordBtn');
        const newMemberName = document.getElementById('newMemberName');
        const newFlowerName = document.getElementById('newFlowerName');
        const newFlowerQuality = document.getElementById('newFlowerQuality');
        const syncMessage = document.getElementById('syncMessage');
        const refreshDataBtn = document.getElementById('refreshDataBtn');
        const totalMembersSpan = document.getElementById('totalMembers');
        const totalFlowersSpan = document.getElementById('totalFlowers');

        function updateStats() {
            totalMembersSpan.textContent = flowerData.length;
            const flowerSet = new Set();
            flowerData.forEach(m => {
                if(m.仙) m.仙.forEach(f => flowerSet.add(f));
                if(m.华) m.华.forEach(f => flowerSet.add(f));
                if(m.珍) m.珍.forEach(f => flowerSet.add(f));
                if(m.普) m.普.forEach(f => flowerSet.add(f));
                if(m.凡) m.凡.forEach(f => flowerSet.add(f));
            });
            totalFlowersSpan.textContent = flowerSet.size;
        }

        async function loadData() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/flowers?select=*`, { headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`} });
                const records = await res.json();
                if(records.length) { flowerData = records[0].data || []; syncMessage.innerHTML = `✅ 云端 ${flowerData.length}位成员`; }
                updateStats();
            } catch(e) {}
        }

        async function saveToCloud() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/flowers?select=id`, { headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`} });
                const records = await res.json();
                const recordId = records[0]?.id || 1;
                await fetch(`${SUPABASE_URL}/rest/v1/flowers?id=eq.${recordId}`, { method:'PATCH', headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"}, body:JSON.stringify({data:flowerData}) });
                syncMessage.innerHTML = `✅ 已同步`; updateStats(); return true;
            } catch(e) { return false; }
        }

        function getAllFlowersFromMember(member) {
            const flowers = [];
            if(member.仙) member.仙.forEach(f => flowers.push({name: f, quality: '仙'}));
            if(member.华) member.华.forEach(f => flowers.push({name: f, quality: '华'}));
            if(member.珍) member.珍.forEach(f => flowers.push({name: f, quality: '珍'}));
            if(member.普) member.普.forEach(f => flowers.push({name: f, quality: '普'}));
            if(member.凡) member.凡.forEach(f => flowers.push({name: f, quality: '凡'}));
            const qualityOrder = { '仙': 1, '华': 2, '珍': 3, '普': 4, '凡': 5 };
            flowers.sort((a, b) => {
                if(a.quality !== b.quality) return qualityOrder[a.quality] - qualityOrder[b.quality];
                if(a.quality === '凡') return getFanRank(a.name) - getFanRank(b.name);
                return a.name.localeCompare(b.name);
            });
            return flowers;
        }

        function renderMemberFlowers(member, filter = 'all') {
            let flowers = getAllFlowersFromMember(member);
            if(filter !== 'all') flowers = flowers.filter(f => f.quality === filter);
            const qualityClass = { '仙': 'xian', '华': 'hua', '珍': 'zhen', '普': 'pu', '凡': 'fan' };
            const html = flowers.map(f => 
                `<div class="flower-card ${qualityClass[f.quality]}">${f.name}</div>`
            ).join('');
            resultArea.innerHTML = `<div class="flower-grid">${html}</div>`;
        }

        function performSearch() {
            const kw = searchInput.value.trim(); if(!kw) return;
            if(queryMode === 'member') {
                const m = flowerData.find(m => m.name.includes(kw));
                if(m) {
                    currentMember = m;
                    filterTabs.style.display = 'flex';
                    document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
                    document.querySelector('.filter-tab.all').classList.add('active');
                    currentFilter = 'all';
                    renderMemberFlowers(m, 'all');
                } else {
                    resultArea.innerHTML = '<div style="color:#a00; text-align:center; padding:20px;">❌ 未找到</div>';
                    filterTabs.style.display = 'none';
                }
            } else {
                const members = flowerData.filter(m => {
                    const allFlowers = [...(m.仙||[]), ...(m.华||[]), ...(m.珍||[]), ...(m.普||[]), ...(m.凡||[])];
                    return allFlowers.some(f => f.includes(kw));
                });
                if(members.length) {
                    filterTabs.style.display = 'none';
                    resultArea.innerHTML = `<div class="member-list">${members.map(m => `<span class="member-tag" onclick="jumpToMember('${m.name}')">${m.name}</span>`).join('')}</div>`;
                } else {
                    resultArea.innerHTML = '<div style="color:#a00; text-align:center; padding:20px;">❌ 未找到</div>';
                    filterTabs.style.display = 'none';
                }
            }
        }

        window.jumpToMember = function(name) {
            queryMode = 'member';
            byMemberBtn.classList.add('active');
            byFlowerBtn.classList.remove('active');
            searchInput.value = name;
            performSearch();
        };

        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                if(!currentMember) return;
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderMemberFlowers(currentMember, currentFilter);
            });
        });

        // 统计卡片弹窗
        function showMemberModal() {
            const members = flowerData.map(m => {
                const total = (m.仙?.length||0) + (m.华?.length||0) + (m.珍?.length||0) + (m.普?.length||0) + (m.凡?.length||0);
                return { name: m.name, count: total };
            }).sort((a,b) => a.name.localeCompare(b.name));
            listModalData = members;
            listModalTitle.innerHTML = '<i class="fas fa-users"></i> 成员列表';
            renderListModal(members);
            listModal.style.display = 'flex';
        }

        function showFlowerModal() {
            const flowerMap = new Map();
            flowerData.forEach(m => {
                if(m.仙) m.仙.forEach(f => flowerMap.set(f, (flowerMap.get(f)||0)+1));
                if(m.华) m.华.forEach(f => flowerMap.set(f, (flowerMap.get(f)||0)+1));
                if(m.珍) m.珍.forEach(f => flowerMap.set(f, (flowerMap.get(f)||0)+1));
                if(m.普) m.普.forEach(f => flowerMap.set(f, (flowerMap.get(f)||0)+1));
                if(m.凡) m.凡.forEach(f => flowerMap.set(f, (flowerMap.get(f)||0)+1));
            });
            const flowers = Array.from(flowerMap.entries()).map(([name, count]) => ({ name, count })).sort((a,b) => a.name.localeCompare(b.name));
            listModalData = flowers;
            listModalTitle.innerHTML = '<i class="fas fa-flower"></i> 花卉图鉴';
            renderListModal(flowers);
            listModal.style.display = 'flex';
        }

        function renderListModal(items) {
            if(!items.length) { listModalContainer.innerHTML = '<div style="text-align:center; padding:30px;">暂无数据</div>'; return; }
            listModalContainer.innerHTML = items.map(item => `
                <div class="modal-list-item" onclick="jumpToItem('${item.name}')">
                    <span class="modal-item-name"><i class="fas fa-${listModalData[0].count !== undefined ? 'user' : 'flower'}"></i> ${item.name}</span>
                    <span class="modal-item-badge">${item.count}</span>
                </div>
            `).join('');
        }

        window.filterListModal = function() {
            const kw = listModalSearch.value.toLowerCase();
            const filtered = listModalData.filter(item => item.name.toLowerCase().includes(kw));
            renderListModal(filtered);
        };

        window.closeListModal = ()=> listModal.style.display = 'none';

        window.jumpToItem = function(name) {
            closeListModal();
            if(listModalTitle.innerHTML.includes('成员')) {
                queryMode = 'member';
                byMemberBtn.classList.add('active');
                byFlowerBtn.classList.remove('active');
                searchInput.value = name;
                performSearch();
            } else {
                queryMode = 'flower';
                byFlowerBtn.classList.add('active');
                byMemberBtn.classList.remove('active');
                searchInput.value = name;
                performSearch();
            }
        };

        document.getElementById('memberStatsCard').onclick = showMemberModal;
        document.getElementById('flowerStatsCard').onclick = showFlowerModal;

        byMemberBtn.onclick = ()=>{ queryMode='member'; byMemberBtn.classList.add('active'); byFlowerBtn.classList.remove('active'); searchInput.placeholder='输入成员名字…'; filterTabs.style.display='none'; };
        byFlowerBtn.onclick = ()=>{ queryMode='flower'; byFlowerBtn.classList.add('active'); byMemberBtn.classList.remove('active'); searchInput.placeholder='输入花卉名称…'; filterTabs.style.display='none'; };
        searchBtn.onclick = performSearch;
        searchInput.onkeydown = e => { if(e.key==='Enter') performSearch(); };

        addRecordBtn.onclick = async ()=>{
            const mName = newMemberName.value.trim();
            const fName = newFlowerName.value.trim();
            const quality = newFlowerQuality.value;
            if(!mName||!fName) return;
            
            let member = flowerData.find(m => m.name === mName);
            if(!member) {
                member = { name: mName, 仙: [], 华: [], 珍: [], 普: [], 凡: [] };
                flowerData.push(member);
            }
            if(!member[quality]) member[quality] = [];
            if(!member[quality].includes(fName)) {
                member[quality].push(fName);
            }
            if(await saveToCloud()) { newMemberName.value=''; newFlowerName.value=''; updateStats(); }
        };

        refreshDataBtn.onclick = loadData;
        window.toggleCollapse = (id)=>{
            const panel = document.getElementById(id), icon = document.getElementById('addIcon');
            panel.classList.toggle('open'); icon.classList.toggle('fa-chevron-down'); icon.classList.toggle('fa-chevron-up');
        };

        checkAuth();
        document.getElementById('addPanel').classList.add('open');
        document.getElementById('addIcon').classList.add('fa-chevron-up');
    })();
</script>
</body>
</html>
