    let currentQuality = "仙";
    
    // 渲染花卉选择面板
    function renderFlowerPicker(quality) {
        const container = document.getElementById('flowerPickerArea');
        const flowers = FLOWER_LIB[quality] || [];
        if(flowers.length === 0) {
            container.innerHTML = '<div style="grid-column:1/-1; text-align:center;">暂无花卉</div>';
            return;
        }
        let html = '';
        flowers.forEach(f => {
            let qClass = '';
            if(quality === '仙') qClass = 'xian';
            else if(quality === '华') qClass = 'hua';
            else if(quality === '珍') qClass = 'zhen';
            else if(quality === '普') qClass = 'pu';
            else qClass = 'fan';
            html += `<div class="pick-flower-item ${qClass}" onclick="addFlowerToMember('${f.replace(/'/g, "\\'")}', '${quality}')">🌸 ${f}</div>`;
        });
        container.innerHTML = html;
    }
    
    // 添加花卉到指定成员
    window.addFlowerToMember = async function(flowerName, quality) {
        const memberName = document.getElementById('targetMemberName').value.trim();
        if(!memberName) {
            alert('请先在「成员名字」框中输入成员名');
            return;
        }
        // 查找或创建成员
        let member = flowerData.find(m => m.name === memberName);
        let isNew = false;
        if(!member) {
            member = { name: memberName, 仙:[], 华:[], 珍:[], 普:[], 凡:[] };
            flowerData.push(member);
            isNew = true;
        }
        if(!member[quality]) member[quality] = [];
        if(member[quality].includes(flowerName)) {
            alert(`「${flowerName}」已经存在于 ${memberName} 的花册中`);
            return;
        }
        member[quality].push(flowerName);
        // 排序保持整洁
        member[quality].sort();
        await saveToCloud();
        updateStats();
        document.getElementById('selectedInfo').innerHTML = `✅ 已添加「${flowerName}」到「${memberName}」 (${quality}品)`;
        setTimeout(() => {
            if(document.getElementById('selectedInfo').innerHTML.includes('已添加'))
                document.getElementById('selectedInfo').innerHTML = '📋 点击任意花卉即可添加到上方成员';
        }, 2000);
        // 刷新当前查看的成员视图
        if(currentMemberObj && currentMemberObj.name === memberName) refreshCurrentMemberView();
    };
    
    async function saveToCloud() {
        try {
            const { data } = await supabase.from('flowers').select('id').limit(1);
            const id = data?.[0]?.id || 1;
            await supabase.from('flowers').upsert({ id, data: flowerData });
            document.getElementById('syncMessage').innerHTML = '✅ 已同步云端';
            return true;
        } catch(e) { console.warn(e); return false; }
    }
    
    function updateStats() {
        document.getElementById('totalMembers').textContent = flowerData.length;
        const allFlowersSet = new Set();
        flowerData.forEach(m => {
            ['仙','华','珍','普','凡'].forEach(q => { if(m[q]) m[q].forEach(f => allFlowersSet.add(f)); });
        });
        document.getElementById('totalFlowers').textContent = allFlowersSet.size;
    }
    
    async function loadData() {
        try {
            const { data } = await supabase.from('flowers').select('data').limit(1);
            if(data && data[0] && data[0].data) flowerData = data[0].data;
            else flowerData = [];
            updateStats();
            document.getElementById('syncMessage').innerHTML = `🌿 已加载 ${flowerData.length} 位成员`;
        } catch(e) { console.error(e); }
    }
    
    function refreshCurrentMemberView() { /* 简单刷新结果区 */ }
    
    // 登录逻辑
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        const errDiv = document.getElementById('loginError');
        if(!email || !pwd) { errDiv.textContent='填写完整'; return; }
        errDiv.textContent='';
        const btn = document.getElementById('loginBtn');
        btn.disabled=true; btn.textContent='登录中...';
        const { error } = await supabase.auth.signInWithPassword({ email, password:pwd });
        btn.disabled=false; btn.textContent='登录';
        if(error) { errDiv.textContent='邮箱或密码错误'; return; }
        const { data:{ session } } = await supabase.auth.getSession();
        currentUser = session.user;
        document.getElementById('authContainer').style.display='none';
        document.getElementById('appContainer').style.display='block';
        loadData();
    }
    
    async function handleRegister() {
        const email = document.getElementById('registerEmail').value.trim();
        const pwd = document.getElementById('registerPassword').value;
        const code = document.getElementById('inviteCode').value.trim();
        if(code !== INVITE_CODE) { document.getElementById('registerError').textContent='邀请码错误'; return; }
        if(pwd.length<6) { document.getElementById('registerError').textContent='密码≥6位'; return; }
        const { error } = await supabase.auth.signUp({ email, password:pwd });
        if(error) document.getElementById('registerError').textContent=error.message;
        else { document.getElementById('registerError').textContent=''; alert('注册成功，请登录'); document.getElementById('loginTab').click(); }
    }
    
    // 品质切换
    document.querySelectorAll('.quality-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentQuality = btn.dataset.quality;
            renderFlowerPicker(currentQuality);
        });
    });
    
    // 初始默认激活仙品
    document.querySelector('.quality-btn.xian').classList.add('active');
    renderFlowerPicker('仙');
    
    // 事件绑定
    document.getElementById('loginBtn').onclick = handleLogin;
    document.getElementById('registerBtn').onclick = handleRegister;
    document.getElementById('logoutBtn').onclick = async () => { await supabase.auth.signOut(); location.reload(); };
    document.getElementById('refreshDataBtn').onclick = loadData;
    document.getElementById('loginTab').onclick = () => { document.getElementById('loginForm').style.display='flex'; document.getElementById('registerForm').style.display='none'; document.getElementById('loginTab').classList.add('active'); document.getElementById('registerTab').classList.remove('active'); };
    document.getElementById('registerTab').onclick = () => { document.getElementById('registerForm').style.display='flex'; document.getElementById('loginForm').style.display='none'; document.getElementById('registerTab').classList.add('active'); document.getElementById('loginTab').classList.remove('active'); };
    document.getElementById('searchBtn').onclick = () => { const kw = document.getElementById('searchInput').value; const member = flowerData.find(m=>m.name.includes(kw)); if(member) document.getElementById('resultArea').innerHTML = `<div>🌸 ${member.name} 拥有 ${(member.仙?.length||0)+(member.华?.length||0)+(member.珍?.length||0)+(member.普?.length||0)+(member.凡?.length||0)} 种花卉</div>`; else document.getElementById('resultArea').innerHTML = '<div>未找到成员</div>'; };
    
    window.toggleCollapse = (id) => {
        const el = document.getElementById(id);
        const icon = document.getElementById(id==='addPanel'?'addIcon':'logIcon');
        if(el) el.classList.toggle('open');
        if(icon) icon.classList.toggle('fa-chevron-down');
    };
    document.getElementById('addPanel').classList.add('open');
    document.getElementById('addIcon').classList.add('fa-chevron-up');
    
    // 检查登录状态
    supabase.auth.getSession().then(({ data:{ session } }) => {
        if(session) { currentUser = session.user; document.getElementById('authContainer').style.display='none'; document.getElementById('appContainer').style.display='block'; loadData(); }
        else { document.getElementById('authContainer').style.display='block'; document.getElementById('appContainer').style.display='none'; }
    });
})();
