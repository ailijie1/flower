    async function checkAuth(){const{data:{session}}=await supabase.auth.getSession();if(session){currentUser=session.user;await loadProfile();showApp();}else{showAuth();}}
    async function loadProfile(){const{data}=await supabase.from('profiles').select('*').eq('id',currentUser.id).single();if(data){currentProfile=data;displayName.textContent=data.nickname||data.email?.split('@')[0]||'花友';guildBadge.textContent=data.guild_id||'gh001';ownerToolbar.style.display=data.role==='owner'?'flex':'none';}await loadGuildData();}
    async function loadGuildData(){const guildId=currentProfile?.guild_id||'gh001';const{data}=await supabase.from('flowers').select('data').eq('guild_id',guildId).single();if(data?.data){flowerData=data.data;updateStats();}syncMessage.textContent=`✅ 已连接 · ${guildId}`;}
    function updateStats(){totalMembersSpan.textContent=flowerData.length;const s=new Set();flowerData.forEach(m=>{['仙','华','珍','普','凡'].forEach(q=>{if(m[q])m[q].forEach(f=>s.add(f));});});totalFlowersSpan.textContent=s.size;}

    registerBtn.onclick=async()=>{const email=document.getElementById('registerEmail').value.trim();const password=document.getElementById('registerPassword').value;const code=document.getElementById('inviteCode').value.trim();const err=document.getElementById('registerError');if(!email||!password||!code){err.textContent='请填写所有字段';return;}if(password.length<6){err.textContent='密码至少6位';return;}err.textContent='';registerBtn.textContent='验证中...';registerBtn.disabled=true;const{data:codeData,error:codeError}=await supabase.from('invite_codes').select('*').eq('code',code).eq('is_active',true).single();if(codeError||!codeData){err.textContent='邀请码无效';registerBtn.textContent='注册';registerBtn.disabled=false;return;}if(new Date(codeData.expires_at)<new Date()){err.textContent='邀请码已过期';registerBtn.textContent='注册';registerBtn.disabled=false;return;}const{data:userData,error:signUpError}=await supabase.auth.signUp({email,password});if(signUpError){err.textContent=signUpError.message;registerBtn.textContent='注册';registerBtn.disabled=false;return;}await supabase.from('profiles').insert({id:userData.user.id,nickname:email.split('@')[0],guild_id:codeData.guild_id,role:'member'});await supabase.from('invite_codes').update({used_count:1,is_active:false}).eq('code',code);alert(`注册成功！欢迎加入 ${codeData.guild_id}`);loginTab.click();registerBtn.textContent='注册';registerBtn.disabled=false;};

    window.openInviteModal=async()=>{inviteModal.style.display='flex';await loadInviteCodes();};

    async function loadInviteCodes(){const guildId=currentProfile?.guild_id;const{data}=await supabase.from('invite_codes').select('*').eq('guild_id',guildId).eq('is_active',true).order('created_at',{ascending:false});if(!data?.length){inviteCodeList.innerHTML='<p>暂无有效邀请码</p>';return;}inviteCodeList.innerHTML=data.map(c=>`<div class="invite-code-box"><div style="display:flex;align-items:center;justify-content:center;"><span class="invite-code">${c.code}</span><button class="copy-btn" onclick="copyCode('${c.code}')">📋</button></div><p style="font-size:0.8rem;">过期: ${new Date(c.expires_at).toLocaleTimeString()}</p></div>`).join('');}
    window.generateInviteCode=async()=>{const guildId=currentProfile?.guild_id||'gh001';const chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';let random='';for(let i=0;i<8;i++)random+=chars.charAt(Math.floor(Math.random()*chars.length));const code=`${guildId}_${random}`;const{error}=await supabase.from('invite_codes').insert({code,guild_id:guildId,type:'member',created_by:currentUser.id,expires_at:new Date(Date.now()+10*60*1000).toISOString()});if(error){alert('生成失败');return;}await loadInviteCodes();};
    window.copyCode=(code)=>{if(navigator.clipboard?.writeText){navigator.clipboard.writeText(code).then(()=>alert('已复制！')).catch(()=>fallbackCopy(code));}else{fallbackCopy(code);}};
    function fallbackCopy(text){const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');alert('已复制！');}catch(e){alert('请手动复制：\n'+text);}document.body.removeChild(ta);}

    // 日志
    async function addCloudLog(a,m,f){try{await fetch(`${SUPABASE_URL}/rest/v1/flower_logs`,{method:'POST',headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"},body:JSON.stringify({action:a,member_name:m,flower_name:f,operator:displayName.textContent,guild_id:currentProfile?.guild_id||'gh001'})});}catch(e){}}
    window.loadCloudLogs=async()=>{const guildId=currentProfile?.guild_id||'gh001';try{const r=await fetch(`${SUPABASE_URL}/rest/v1/flower_logs?select=*&guild_id=eq.${guildId}&order=created_at.desc&limit=30`,{headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`}});const l=await r.json();logList.innerHTML=l.length?l.map(log=>{const t=new Date(log.created_at).toLocaleTimeString('zh-CN',{hour12:false,hour:'2-digit',minute:'2-digit'});return`<li class="log-item"><span class="log-time">${t}</span> <span class="log-operator">${log.operator||'未知'}</span> ${log.action}${log.member_name?'：'+log.member_name:''}${log.flower_name?' → '+log.flower_name:''}</li>`;}).join(''):'<li class="log-item">暂无日志</li>';}catch(e){}};

    // 查询
    byMemberBtn.onclick=()=>{queryMode='member';byMemberBtn.classList.add('active');byFlowerBtn.classList.remove('active');searchInput.placeholder='输入成员名字…';};
    byFlowerBtn.onclick=()=>{queryMode='flower';byFlowerBtn.classList.add('active');byMemberBtn.classList.remove('active');searchInput.placeholder='输入花卉名称…';};
    searchBtn.onclick=()=>{const kw=searchInput.value.trim();if(!kw)return;if(queryMode==='member'){const m=flowerData.find(m=>m.name.includes(kw));if(m){currentMemberName=m.name;const fs=[];['仙','华','珍','普','凡'].forEach(q=>{if(m[q])m[q].forEach(f=>fs.push({name:f,quality:q}));});currentFlowersList=fs;renderFlowerPage(fs,1);addCloudLog('查询成员',m.name);}else{resultArea.innerHTML='<div style="color:#a00;text-align:center;">❌ 未找到</div>';}}else{const flowerMap=new Map();flowerData.forEach(m=>{['仙','华','珍','普','凡'].forEach(q=>{if(m[q])m[q].forEach(f=>{if(f.includes(kw)){if(!flowerMap.has(f))flowerMap.set(f,{quality:q,count:0});flowerMap.get(f).count++;}});});});const matches=Array.from(flowerMap.entries()).map(([name,info])=>({name,quality:info.quality,count:info.count}));const qo={仙:1,华:2,珍:3,普:4,凡:5};matches.sort((a,b)=>{if(a.quality!==b.quality)return qo[a.quality]-qo[b.quality];if(a.quality==='凡')return getFanRank(a.name)-getFanRank(b.name);return a.name.localeCompare(b.name);});if(matches.length){const qc={仙:'xian',华:'hua',珍:'zhen',普:'pu',凡:'fan'};resultArea.innerHTML=matches.map(m=>`<div class="flower-result-item ${qc[m.quality]}" onclick="showFlowerOwners('${m.name}')"><span>${m.name}</span><span class="flower-count-badge">${m.count}人</span></div>`).join('');addCloudLog('查询花卉',null,kw);}else{resultArea.innerHTML='<div style="color:#a00;text-align:center;">❌ 未找到</div>';}}};
    function renderFlowerPage(fs,p){const s=(p-1)*pageSize,e=s+pageSize,pf=fs.slice(s,e),tp=Math.ceil(fs.length/pageSize);const qc={仙:'xian',华:'hua',珍:'zhen',普:'pu',凡:'fan'};let h=`<div class="flower-grid">`;pf.forEach(f=>{h+=`<div class="flower-card ${qc[f.quality]}" onclick="jumpToFlower('${f.name}')">${f.name}<button class="delete-btn" onclick="event.stopPropagation();deleteFlower('${currentMemberName}','${f.name}')">✕</button></div>`;});h+=`</div>`;if(tp>1)h+=`<div class="pagination"><div class="page-btn ${p===1?'disabled':''}" onclick="window.goToPage(${p-1})">上一页</div><span class="page-info">${p}/${tp}</span><div class="page-btn ${p===tp?'disabled':''}" onclick="window.goToPage(${p+1})">下一页</div></div>`;resultArea.innerHTML=h;currentPage=p;}
    window.goToPage=(p)=>renderFlowerPage(currentFlowersList,p);
    window.jumpToFlower=(n)=>{queryMode='flower';byFlowerBtn.click();searchInput.value=n;searchBtn.click();};
    window.showFlowerOwners=(flowerName)=>{const owners=flowerData.filter(m=>['仙','华','珍','普','凡'].some(q=>m[q]?.includes(flowerName)));listModalData=owners.map(m=>({name:m.name,count:(m.仙?.length||0)+(m.华?.length||0)+(m.珍?.length||0)+(m.普?.length||0)+(m.凡?.length||0)}));listModalTitle.innerHTML=`<i class="fas fa-flower"></i> 拥有「${flowerName}」的成员`;renderSimpleList(listModalData);listModal.style.display='flex';};
    function renderSimpleList(items){if(!items.length){listModalContainer.innerHTML='<div style="text-align:center;padding:30px;">暂无数据</div>';return;}listModalContainer.innerHTML=items.map(i=>`<div class="modal-list-item" onclick="jumpToMember('${i.name}')"><span class="modal-item-name"><i class="fas fa-user"></i> ${i.name}</span><span class="modal-item-badge">${i.count}种</span></div>`).join('');}
    window.jumpToMember=(n)=>{closeListModal();queryMode='member';byMemberBtn.click();searchInput.value=n;searchBtn.click();};

    // 删除
    window.deleteFlower=async(mName,fName)=>{if(!confirm(`确定从 ${mName} 删除 ${fName} 吗？`))return;const m=flowerData.find(m=>m.name===mName);if(!m)return;['仙','华','珍','普','凡'].forEach(q=>{if(m[q])m[q]=m[q].filter(f=>f!==fName);});if(await saveGuildData()){addCloudLog('删除花卉',mName,fName);updateStats();searchBtn.click();}};
    window.deleteMember=async(memberName)=>{if(!confirm(`确定删除成员 ${memberName} 及其所有花卉吗？`))return;const idx=flowerData.findIndex(m=>m.name===memberName);if(idx===-1)return;flowerData.splice(idx,1);if(await saveGuildData()){addCloudLog('删除成员',memberName);updateStats();showMemberModal();}};

    // 添加
    document.getElementById('addRecordBtn').onclick=async()=>{const mName=document.getElementById('newMemberName').value.trim();const fName=document.getElementById('newFlowerName').value.trim();if(!mName||!fName)return;const q=getFlowerQuality(fName);let m=flowerData.find(m=>m.name===mName);let isNew=false;if(!m){m={name:mName,仙:[],华:[],珍:[],普:[],凡:[]};flowerData.push(m);isNew=true;}if(!m[q])m[q]=[];if(!m[q].includes(fName)){m[q].push(fName);}await saveGuildData();document.getElementById('newMemberName').value='';document.getElementById('newFlowerName').value='';updateStats();addCloudLog(isNew?'新增成员':'添加花卉',mName,fName);};
    async function saveGuildData(){const guildId=currentProfile?.guild_id||'gh001';const{data}=await supabase.from('flowers').select('id').eq('guild_id',guildId).single();if(data){await supabase.from('flowers').update({data:flowerData}).eq('id',data.id);}syncMessage.textContent=`✅ 已保存 · ${guildId}`;return true;}

    // 弹窗
    function showMemberModal(){const ms=flowerData.map(m=>({name:m.name,count:(m.仙?.length||0)+(m.华?.length||0)+(m.珍?.length||0)+(m.普?.length||0)+(m.凡?.length||0)})).sort((a,b)=>a.name.localeCompare(b.name));listModalData=ms;listModalTitle.innerHTML='<i class="fas fa-users"></i> 成员列表';listModalContainer.innerHTML=ms.map(i=>`<div class="modal-list-item"><span class="modal-item-name" onclick="jumpToMember('${i.name}')"><i class="fas fa-user"></i> ${i.name}</span><span class="modal-item-badge">${i.count}种</span><button class="member-delete-btn" onclick="event.stopPropagation();deleteMember('${i.name}')"><i class="fas fa-trash"></i></button></div>`).join('');listModal.style.display='flex';}
    function showFlowerModal(){const map=new Map();flowerData.forEach(m=>{['仙','华','珍','普','凡'].forEach(q=>{if(m[q])m[q].forEach(f=>map.set(f,(map.get(f)||0)+1));});});const fs=Array.from(map.entries()).map(([n,c])=>{const q=getFlowerQuality(n);return{name:n,count:c,quality:q,qo:{仙:1,华:2,珍:3,普:4,凡:5}[q]||5};}).sort((a,b)=>{if(a.qo!==b.qo)return a.qo-b.qo;if(a.quality==='凡')return getFanRank(a.name)-getFanRank(b.name);return a.name.localeCompare(b.name);});listModalData=fs;listModalTitle.innerHTML='<i class="fas fa-flower"></i> 花卉图鉴';const qi={仙:'🔴',华:'🟡',珍:'🟣',普:'🔵',凡:'🟢'};listModalContainer.innerHTML=fs.map(i=>`<div class="modal-list-item" onclick="showFlowerOwners('${i.name}')"><span class="modal-item-name">${qi[i.quality]||'⚪'} ${i.name}</span><span class="modal-item-badge">${i.count}人</span></div>`).join('');listModal.style.display='flex';}
    window.filterListModal=()=>{const kw=listModalSearch.value.toLowerCase();renderSimpleList(listModalData.filter(i=>i.name.toLowerCase().includes(kw)));};
    window.closeListModal=()=>listModal.style.display='none';
    document.getElementById('memberStatsCard').onclick=showMemberModal;
    document.getElementById('flowerStatsCard').onclick=showFlowerModal;
    document.getElementById('refreshDataBtn').onclick=loadGuildData;
    window.toggleCollapse=(id)=>{const p=document.getElementById(id),i=document.getElementById(id==='addPanel'?'addIcon':'logIcon');p.classList.toggle('open');i.classList.toggle('fa-chevron-down');i.classList.toggle('fa-chevron-up');if(id==='logPanel'&&p.classList.contains('open'))loadCloudLogs();};

    // ========== 批量导入（从完整品级表取所有花） ==========
    function buildAllFlowersList(){
        const flowers=Object.entries(FLOWER_QUALITY_MAP).map(([name,quality])=>({name,quality}));
        const qo={仙:1,华:2,珍:3,普:4,凡:5};
        flowers.sort((a,b)=>{
            if(a.quality!==b.quality)return qo[a.quality]-qo[b.quality];
            if(a.quality==='凡')return getFanRank(a.name)-getFanRank(b.name);
            return a.name.localeCompare(b.name);
        });
        return flowers;
    }
    window.openBatchModal=()=>{
        batchModal.style.display='flex';
        document.getElementById('batchMemberName').value='';
        document.getElementById('batchResult').innerHTML='';
        selectedBatchFlowers.clear();
        allFlowersList=buildAllFlowersList();
        currentBatchFilter='all';
        document.querySelectorAll('#batchModal .filter-tab').forEach(t=>t.classList.remove('active'));
        document.querySelector('#batchModal .filter-tab.all').classList.add('active');
        batchSearchInput.value='';
        renderBatchFlowerList(allFlowersList);
    };
    window.closeBatchModal=()=>batchModal.style.display='none';
    function renderBatchFlowerList(flowers){
        if(!flowers.length){batchFlowerList.innerHTML='<div style="text-align:center;padding:20px;color:#7f9f6b;">暂无花卉</div>';return;}
        const qi={仙:'🔴',华:'🟡',珍:'🟣',普:'🔵',凡:'🟢'};
        batchFlowerList.innerHTML=flowers.map(f=>{
            const checked=selectedBatchFlowers.has(f.name)?'checked':'';
            return`<div class="batch-checkbox-item"><input type="checkbox" id="chk_${f.name}" ${checked} onchange="toggleBatchFlower('${f.name}')"><label for="chk_${f.name}">${qi[f.quality]} ${f.name}</label></div>`;
        }).join('');
        updateSelectedCount();
    }
    window.toggleBatchFlower=(name)=>{selectedBatchFlowers.has(name)?selectedBatchFlowers.delete(name):selectedBatchFlowers.add(name);updateSelectedCount();};
    function updateSelectedCount(){selectedCount.textContent=`已选 ${selectedBatchFlowers.size} 种花卉`;}
    window.filterBatchFlowers=()=>{
        const kw=batchSearchInput.value.toLowerCase();
        let filtered=allFlowersList;
        if(currentBatchFilter!=='all')filtered=filtered.filter(f=>f.quality===currentBatchFilter);
        if(kw)filtered=filtered.filter(f=>f.name.toLowerCase().includes(kw));
        renderBatchFlowerList(filtered);
    };
    window.selectAllVisible=()=>{
        const checkboxes=document.querySelectorAll('#batchFlowerList input[type="checkbox"]');
        checkboxes.forEach(cb=>{selectedBatchFlowers.add(cb.id.replace('chk_',''));cb.checked=true;});
        updateSelectedCount();
    };
    document.querySelectorAll('#batchModal .filter-tab').forEach(t=>{
        t.addEventListener('click',()=>{
            document.querySelectorAll('#batchModal .filter-tab').forEach(x=>x.classList.remove('active'));
            t.classList.add('active');
            currentBatchFilter=t.dataset.filter;
            filterBatchFlowers();
        });
    });
    window.executeBatchImport=async()=>{
        const memberName=document.getElementById('batchMemberName').value.trim();
        if(!memberName){alert('请输入成员名字');return;}
        if(selectedBatchFlowers.size===0){alert('请至少选择一种花卉');return;}
        let member=flowerData.find(m=>m.name===memberName);
        let isNew=false;
        if(!member){member={name:memberName,仙:[],华:[],珍:[],普:[],凡:[]};flowerData.push(member);isNew=true;}
        let added=0;
        for(const f of selectedBatchFlowers){
            const q=getFlowerQuality(f);
            if(!member[q])member[q]=[];
            if(!member[q].includes(f)){member[q].push(f);added++;}
        }
        if(await saveGuildData()){
            addCloudLog(isNew?'批量新增成员':'批量添加花卉',memberName,`${added}种花`);
            document.getElementById('batchResult').innerHTML=`<span style="color:#2e7d32;">成功导入 ${added} 种花卉！</span>`;
            updateStats();
            selectedBatchFlowers.clear();
            setTimeout(()=>closeBatchModal(),1500);
        }else{document.getElementById('batchResult').innerHTML='<span style="color:#d32f2f;">导入失败</span>';}
    };

    // 启动
    checkAuth();
    document.getElementById('addPanel').classList.add('open');
    document.getElementById('addIcon').classList.add('fa-chevron-up');
})();
</script>
</body>
</html>
