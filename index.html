<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌸 花园世界 · 公会花册 Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif; }
        body { background: linear-gradient(145deg, #e8f5e9 0%, #c8e6c9 100%); min-height: 100vh; padding: 20px 16px; display: flex; align-items: flex-start; justify-content: center; }
        .container { max-width: 750px; width: 100%; margin: 0 auto; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); padding: 28px 22px; border-radius: 48px 24px 48px 24px; box-shadow: 0 20px 40px rgba(30,60,20,0.12); border: 1px solid rgba(160,200,120,0.3); max-height: calc(100vh - 40px); overflow-y: auto; }
        h1 { color: #2e5a1e; text-align: center; font-weight: 600; font-size: 2rem; margin-bottom: 6px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .subtitle { text-align: center; color: #5a7e4a; margin-bottom: 20px; font-size: 0.95rem; border-bottom: 1px dashed #a4c28e; padding-bottom: 14px; }
        .auth-container { max-width: 400px; margin: 0 auto; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 24px; background: rgba(230,245,210,0.6); padding: 5px; border-radius: 50px; }
        .auth-tab { flex: 1; padding: 12px; border: none; background: transparent; color: #3a5e2a; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .auth-tab.active { background: #3a7a2e; color: white; }
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .auth-input { padding: 14px 18px; border: 1.5px solid #b8daa0; border-radius: 40px; font-size: 1rem; background: white; outline: none; }
        .auth-input:focus { border-color: #3a7a2e; box-shadow: 0 0 0 3px rgba(58,122,46,0.1); }
        .auth-btn { padding: 14px; background: #3a7a2e; color: white; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; box-shadow: 0 5px 0 #245218; transition: 0.1s; font-size: 1.1rem; }
        .auth-footer { text-align: center; margin-top: 16px; color: #5a7e4a; font-size: 0.9rem; }
        .error-message { color: #d32f2f; text-align: center; font-size: 0.9rem; min-height: 24px; }
        .success-message { color: #2e7d32; text-align: center; font-size: 0.9rem; min-height: 24px; }
        .app-container { display: none; }
        .user-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding: 8px 12px 8px 16px; background: rgba(230,245,210,0.5); border-radius: 50px; position: relative; }
        .user-profile { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 4px 12px 4px 4px; border-radius: 40px; background: rgba(255,255,255,0.3); transition: 0.2s; }
        .user-profile:hover { background: rgba(255,255,255,0.6); }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #3a7a2e, #5a9e4a); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 1.2rem; }
        .user-name { font-weight: 600; color: #2e5a1e; }
        .user-name i { margin-left: 4px; font-size: 0.7rem; opacity: 0.7; }
        .user-menu { position: absolute; top: 55px; left: 10px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); padding: 8px; display: none; z-index: 100; min-width: 160px; }
        .user-menu-item { padding: 12px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 12px; color: #2e5a1e; transition: 0.15s; }
        .user-menu-item:hover { background: #f0f8ea; }
        .user-menu-item.danger { color: #d32f2f; }
        .logout-btn { padding: 8px 16px; background: #d32f2f; color: white; border: none; border-radius: 30px; cursor: pointer; font-size: 0.85rem; font-weight: 500; }
        .btn-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 18px; background: rgba(230,245,210,0.6); padding: 5px; border-radius: 50px; }
        .query-btn { padding: 10px 24px; border: none; background: transparent; color: #3a5e2a; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .query-btn.active { background: #3a7a2e; color: white; }
        .search-box { display: flex; gap: 8px; margin-bottom: 18px; background: white; padding: 6px 6px 6px 18px; border-radius: 50px; border: 1.5px solid #b8daa0; }
        #searchInput { flex: 1; padding: 12px 6px 12px 0; border: none; background: transparent; font-size: 1rem; outline: none; }
        #searchBtn { padding: 12px 24px; background: #3a7a2e; color: white; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; box-shadow: 0 5px 0 #245218; }
        .stats-row { display: flex; gap: 10px; margin-bottom: 18px; }
        .stat-card { flex: 1; background: linear-gradient(135deg, #f0f8ea, #e0efd5); padding: 16px 6px; border-radius: 20px; text-align: center; border: 1px solid #bdd8ae; cursor: pointer; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-number { font-size: 2rem; font-weight: 700; color: #1e5a1e; }
        .stat-label { font-size: 0.85rem; color: #5a7e4a; }
        .filter-tabs { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .filter-tab { padding: 6px 16px; border-radius: 30px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: 0.2s; background: #f0f0f0; color: #555; }
        .filter-tab.active { opacity: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .filter-tab.all { background: #6b8a58; color: white; }
        .filter-tab.xian { background: #e53935; color: white; }
        .filter-tab.hua { background: #f9a825; color: white; }
        .filter-tab.zhen { background: #8e24aa; color: white; }
        .filter-tab.pu { background: #1e88e5; color: white; }
        .filter-tab.fan { background: #43a047; color: white; }
        .result-area { min-height: 160px; padding: 16px 12px; background: rgba(255,255,255,0.7); backdrop-filter: blur(5px); border-radius: 24px; border: 1px solid #cde0bd; margin-bottom: 18px; }
        .flower-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .flower-card { padding: 12px 6px; text-align: center; border-radius: 20px; font-size: 0.9rem; font-weight: 500; word-break: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.15s; position: relative; }
        .flower-card:hover { transform: scale(1.02); }
        .flower-card.xian { background: linear-gradient(135deg, #ffebee, #ffcdd2); border: 1px solid #e53935; color: #b71c1c; }
        .flower-card.hua { background: linear-gradient(135deg, #fff8e1, #ffecb3); border: 1px solid #f9a825; color: #e65100; }
        .flower-card.zhen { background: linear-gradient(135deg, #f3e5f5, #e1bee7); border: 1px solid #8e24aa; color: #4a148c; }
        .flower-card.pu { background: linear-gradient(135deg, #e3f2fd, #bbdefb); border: 1px solid #1e88e5; color: #0d47a1; }
        .flower-card.fan { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border: 1px solid #43a047; color: #1b5e20; }
        .flower-delete { position: absolute; top: 2px; right: 2px; width: 20px; height: 20px; background: #d32f2f; color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }
        .flower-card:hover .flower-delete { display: flex; }
        .member-list { display: flex; flex-wrap: wrap; gap: 8px 12px; }
        .member-tag { background: #e0f0d0; padding: 6px 16px; border-radius: 30px; color: #1e4a1e; border: 1px solid #a0c090; cursor: pointer; transition: 0.2s; }
        .member-tag:hover { background: #c8e0b8; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 16px; }
        .page-btn { padding: 8px 18px; background: #eaf0e4; border: 1px solid #9bb88a; border-radius: 30px; cursor: pointer; color: #2e5a1e; font-weight: 500; }
        .page-btn.disabled { opacity: 0.4; pointer-events: none; }
        .page-info { color: #3e6a2e; font-weight: 500; }
        .collapsible { margin-top: 16px; border-top: 1px dashed #a4c28e; padding-top: 16px; }
        .collapse-header { display: flex; align-items: center; gap: 10px; cursor: pointer; color: #2e5a1e; font-weight: 600; font-size: 1.1rem; padding: 8px 0; }
        .collapse-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .collapse-content.open { max-height: 400px; overflow-y: auto; }
        .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        .form-input { flex: 1; min-width: 140px; padding: 12px 16px; border: 1.5px solid #b8daa0; border-radius: 40px; background: white; }
        .add-btn { padding: 12px 24px; background: #e68900; color: white; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; box-shadow: 0 5px 0 #b26500; }
        .batch-btn { padding: 6px 16px; background: #9c27b0; color: white; border: none; border-radius: 40px; font-size: 0.8rem; cursor: pointer; box-shadow: 0 4px 0 #6a1b9a; }
        .sync-status { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; color: #3e6a2e; font-size: 0.9rem; }
        .refresh-btn { padding: 8px 18px; background: #6f9e4c; color: white; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 0 #3e6925; }
        .log-list { list-style: none; padding: 8px 0; }
        .log-item { padding: 10px 0; border-bottom: 1px solid #d0e0c0; display: flex; gap: 10px; font-size: 0.9rem; color: #2e4a1e; }
        .log-time { color: #7f9f6b; min-width: 65px; }
        .log-operator { font-weight: 600; color: #3a7a2e; }
        .footer { text-align: center; color: #6b8a58; font-size: 0.8rem; margin-top: 20px; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal { background: white; max-width: 500px; width: 100%; max-height: 70vh; border-radius: 32px; overflow: hidden; }
        .modal-header { padding: 20px 24px; background: linear-gradient(135deg, #e8f5e9, #c8e6c9); display: flex; align-items: center; justify-content: space-between; }
        .modal-title { font-size: 1.3rem; font-weight: 700; color: #2e5a1e; }
        .modal-close { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.5); border: none; font-size: 1.2rem; cursor: pointer; }
        .modal-body { padding: 20px 24px; max-height: 50vh; overflow-y: auto; }
        .modal-search { padding: 12px 16px; border: 1.5px solid #b8daa0; border-radius: 30px; width: 100%; margin-bottom: 16px; outline: none; }
        .modal-list-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #e0efd5; cursor: pointer; border-radius: 12px; transition: 0.15s; }
        .modal-list-item:hover { background: #f0f8ea; }
        .modal-item-name { font-weight: 500; color: #1e4a1e; }
        .modal-item-badge { background: #3a7a2e; color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; }
        .modal-input { padding: 14px 18px; border: 1.5px solid #b8daa0; border-radius: 40px; width: 100%; margin-bottom: 16px; }
        .modal-btn { padding: 14px; background: #3a7a2e; color: white; border: none; border-radius: 40px; font-weight: 600; width: 100%; cursor: pointer; }
        .delete-btn { background: #d32f2f; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; margin-left: 8px; }
        .admin-panel { background: rgba(255,255,255,0.5); border-radius: 20px; padding: 16px; margin-bottom: 18px; }
        .admin-title { font-size: 1.1rem; font-weight: 600; color: #2e5a1e; margin-bottom: 12px; }
        .admin-member-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: white; border-radius: 15px; margin-bottom: 8px; }
        #batchPreview span { display: inline-block; padding: 4px 10px; border-radius: 20px; margin: 4px; font-size: 0.85rem; }
        @media (max-width: 480px) { .flower-grid { grid-template-columns: repeat(2, 1fr); } .container { padding: 20px 16px; } }
    </style>
</head>
<body>
<div class="container">
    <div id="authContainer" class="auth-container">
        <h1>🌸 花园世界</h1>
        <p class="subtitle">公会专属 · 登录后使用</p>
        <div class="auth-tabs">
            <button class="auth-tab active" id="loginTab">登录</button>
            <button class="auth-tab" id="registerTab">注册</button>
        </div>
        <div id="loginForm" class="auth-form">
            <input type="email" id="loginEmail" class="auth-input" placeholder="邮箱">
            <input type="password" id="loginPassword" class="auth-input" placeholder="密码">
            <div id="loginError" class="error-message"></div>
            <button class="auth-btn" id="loginBtn">登录</button>
        </div>
        <div id="registerForm" class="auth-form" style="display:none;">
            <input type="email" id="registerEmail" class="auth-input" placeholder="邮箱">
            <input type="password" id="registerPassword" class="auth-input" placeholder="密码（至少6位）">
            <input type="text" id="inviteCode" class="auth-input" placeholder="邀请码">
            <div id="registerError" class="error-message"></div>
            <div id="registerSuccess" class="success-message"></div>
            <button class="auth-btn" id="registerBtn">注册</button>
        </div>
        <p class="auth-footer">🌱 需要邀请码？请联系公会管理员</p>
    </div>

    <div id="appContainer" class="app-container">
        <div class="user-bar">
            <div class="user-profile" id="userProfile">
                <div class="user-avatar" id="userAvatar">🌸</div>
                <span class="user-name" id="userName">花友 <i class="fas fa-pencil-alt"></i></span>
            </div>
            <div class="user-menu" id="userMenu">
                <div class="user-menu-item" onclick="openNicknameModal()"><i class="fas fa-user-edit"></i> 修改昵称</div>
                <div class="user-menu-item" onclick="openAdminPanel()" id="adminMenuItem" style="display:none;"><i class="fas fa-crown"></i> 管理后台</div>
                <div class="user-menu-item" onclick="openBecomeAdminModal()" id="becomeAdminItem"><i class="fas fa-key"></i> 成为管理员</div>
                <div class="user-menu-item danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出登录</div>
            </div>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>

        <div id="adminPanel" class="admin-panel" style="display:none;">
            <div class="admin-title"><i class="fas fa-crown"></i> 管理后台</div>
            <div id="adminMemberList"></div>
        </div>

        <div class="btn-group">
            <button class="query-btn active" id="byMemberBtn"><i class="fas fa-user"></i> 查成员</button>
            <button class="query-btn" id="byFlowerBtn"><i class="fas fa-flower"></i> 查花卉</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入成员名字…">
            <button id="searchBtn"><i class="fas fa-search"></i> 查询</button>
        </div>

        <div class="stats-row">
            <div class="stat-card" id="memberStatsCard">
                <div class="stat-number" id="totalMembers">0</div>
                <div class="stat-label">总成员 <i class="fas fa-chevron-right"></i></div>
            </div>
            <div class="stat-card" id="flowerStatsCard">
                <div class="stat-number" id="totalFlowers">0</div>
                <div class="stat-label">花卉种类 <i class="fas fa-chevron-right"></i></div>
            </div>
        </div>

        <div class="filter-tabs" id="filterTabs" style="display:none;">
            <button class="filter-tab all active" data-filter="all">全</button>
            <button class="filter-tab xian" data-filter="仙">仙</button>
            <button class="filter-tab hua" data-filter="华">华</button>
            <button class="filter-tab zhen" data-filter="珍">珍</button>
            <button class="filter-tab pu" data-filter="普">普</button>
            <button class="filter-tab fan" data-filter="凡">凡</button>
        </div>

        <div id="resultArea" class="result-area">
            <div style="color:#5a7e4a; text-align:center; padding:20px;">
                <i class="fas fa-hand-pointer"></i> 输入关键词查询
            </div>
        </div>

        <div class="collapsible">
            <div class="collapse-header" onclick="toggleCollapse('addPanel')">
                <i class="fas fa-plus-circle" style="color:#e68900;"></i> 添加花卉记录
                <button class="batch-btn" onclick="event.stopPropagation(); openBatchModal()"><i class="fas fa-file-import"></i> 批量导入</button>
                <i class="fas fa-chevron-down" id="addIcon" style="margin-left:auto;"></i>
            </div>
            <div id="addPanel" class="collapse-content">
                <div class="form-row">
                    <input type="text" id="newMemberName" class="form-input" placeholder="成员名字">
                    <input type="text" id="newFlowerName" class="form-input" placeholder="花卉名称">
                    <button class="add-btn" id="addRecordBtn"><i class="fas fa-cloud-upload-alt"></i> 添加</button>
                </div>
            </div>
        </div>

        <div class="collapsible">
            <div class="collapse-header" onclick="toggleCollapse('logPanel')">
                <i class="fas fa-history" style="color:#6f9e4c;"></i> 云端更新日志
                <i class="fas fa-chevron-down" id="logIcon" style="margin-left:auto;"></i>
            </div>
            <div id="logPanel" class="collapse-content">
                <div style="display:flex; justify-content:flex-end; margin-bottom:8px;">
                    <button class="refresh-btn" style="padding:4px 12px;" onclick="event.stopPropagation(); loadCloudLogs()">
                        <i class="fas fa-sync-alt"></i> 刷新
                    </button>
                </div>
                <ul class="log-list" id="logList"></ul>
            </div>
        </div>

        <div class="sync-status">
            <span id="syncMessage"><i class="fas fa-sync fa-spin"></i> 连接中</span>
            <button class="refresh-btn" id="refreshDataBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
        </div>

        <p class="footer"><i class="fas fa-lock"></i> 仅限公会成员</p>
    </div>
</div>

<!-- 昵称修改弹窗 -->
<div class="modal-overlay" id="nicknameModal">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title"><i class="fas fa-user-edit"></i> 修改昵称</span>
            <button class="modal-close" onclick="closeNicknameModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <input type="text" id="nicknameInput" class="modal-input" placeholder="输入新昵称" maxlength="12">
            <button class="modal-btn" onclick="saveNickname()">保存</button>
        </div>
    </div>
</div>

<!-- 成为管理员弹窗 -->
<div class="modal-overlay" id="becomeAdminModal">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title"><i class="fas fa-key"></i> 成为管理员</span>
            <button class="modal-close" onclick="closeBecomeAdminModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <input type="text" id="adminInviteCode" class="modal-input" placeholder="输入管理员邀请码">
            <button class="modal-btn" onclick="becomeAdmin()">验证</button>
        </div>
    </div>
</div>

<!-- 成员/花卉列表弹窗 -->
<div class="modal-overlay" id="listModal">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title" id="listModalTitle"><i class="fas fa-users"></i> 成员列表</span>
            <button class="modal-close" onclick="closeListModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <input type="text" class="modal-search" id="listModalSearch" placeholder="🔍 搜索..." oninput="filterListModal()">
            <div id="listModalContainer"></div>
        </div>
    </div>
</div>

<!-- 批量导入弹窗 -->
<div class="modal-overlay" id="batchModal">
    <div class="modal" style="max-width:600px;" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title"><i class="fas fa-file-import"></i> 批量导入花卉</span>
            <button class="modal-close" onclick="closeBatchModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <input type="text" id="batchMemberName" class="modal-input" placeholder="成员名字">
            <p style="color:#5a7e4a; margin-bottom:8px; font-size:0.9rem;">
                <i class="fas fa-info-circle"></i> 粘贴花名（一行一个，或用逗号/空格分隔）
            </p>
            <textarea id="batchFlowersInput" style="width:100%; height:200px; padding:14px; border:1.5px solid #b8daa0; border-radius:16px; font-size:0.9rem;" placeholder="例如：&#10;白百合&#10;康乃馨&#10;铃兰"></textarea>
            <div id="batchPreview" style="margin-top:12px; max-height:150px; overflow-y:auto;"></div>
            <div style="display:flex; gap:10px; margin-top:16px;">
                <button class="modal-btn" onclick="previewBatchFlowers()" style="flex:1; background:#6f9e4c;"><i class="fas fa-eye"></i> 预览</button>
                <button class="modal-btn" onclick="executeBatchImport()" style="flex:2;"><i class="fas fa-upload"></i> 导入</button>
            </div>
            <div id="batchResult" style="margin-top:12px; font-size:0.9rem;"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        const s = new Set();
        flowerData.forEach(m => { ['仙','华','珍','普','凡'].forEach(q => { if(m[q]) m[q].forEach(f => s.add(f)); }); });
        totalFlowersSpan.textContent = s.size;
    }

    async function loadData() {
        try {
            const r = await fetch(`${SUPABASE_URL}/rest/v1/flowers?select=*`, { headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`} });
            const d = await r.json();
            if(d.length) { flowerData = d[0].data || []; syncMessage.innerHTML = `✅ 云端 ${flowerData.length}位成员`; }
            updateStats();
        } catch(e) {}
    }

    async function saveToCloud() {
        try {
            const r = await fetch(`${SUPABASE_URL}/rest/v1/flowers?select=id`, { headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`} });
            const d = await r.json();
            const id = d[0]?.id || 1;
            await fetch(`${SUPABASE_URL}/rest/v1/flowers?id=eq.${id}`, { method:'PATCH', headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"}, body:JSON.stringify({data:flowerData}) });
            syncMessage.innerHTML = `✅ 已同步`; updateStats(); return true;
        } catch(e) { return false; }
    }

    function getAllFlowers(m) {
        const f = [];
        ['仙','华','珍','普','凡'].forEach(q => { if(m[q]) m[q].forEach(n => f.push({name:n, quality:q})); });
        const o = { '仙':1, '华':2, '珍':3, '普':4, '凡':5 };
        f.sort((a,b) => { if(a.quality!==b.quality) return o[a.quality]-o[b.quality]; if(a.quality==='凡') return getFanRank(a.name)-getFanRank(b.name); return a.name.localeCompare(b.name); });
        return f;
    }

    function renderFlowerPage(fs, p) {
        const s = (p-1)*pageSize, e = s+pageSize, pf = fs.slice(s,e), tp = Math.ceil(fs.length/pageSize);
        const qc = { '仙':'xian', '华':'hua', '珍':'zhen', '普':'pu', '凡':'fan' };
        let h = `<div class="flower-grid">`;
        pf.forEach(f => { h += `<div class="flower-card ${qc[f.quality]}" onclick="jumpToFlower('${f.name}')">${f.name}${isAdmin?'<span class="flower-delete" onclick="event.stopPropagation();deleteFlowerFromMember(\''+currentMember.name+'\',\''+f.name+'\')"><i class=\'fas fa-times\'></i></span>':''}</div>`; });
        h += `</div>`;
        if(tp>1) h += `<div class="pagination"><div class="page-btn ${p===1?'disabled':''}" onclick="window.goToPage(${p-1})"><i class="fas fa-chevron-left"></i> 上一页</div><span class="page-info">${p} / ${tp}</span><div class="page-btn ${p===tp?'disabled':''}" onclick="window.goToPage(${p+1})">下一页 <i class="fas fa-chevron-right"></i></div></div>`;
        resultArea.innerHTML = h; currentPage = p;
    }

    window.goToPage = p => renderFlowerPage(currentFlowersList, p);
    window.jumpToFlower = n => { queryMode='flower'; document.getElementById('byFlowerBtn').classList.add('active'); document.getElementById('byMemberBtn').classList.remove('active'); document.getElementById('searchInput').value = n; performSearch(); };
    window.deleteFlowerFromMember = async (mName, fName) => {
        if(!confirm(`确定从 ${mName} 删除 ${fName} 吗？`)) return;
        const m = flowerData.find(m => m.name === mName);
        if(!m) return;
        ['仙','华','珍','普','凡'].forEach(q => { if(m[q]) m[q] = m[q].filter(f => f !== fName); });
        if(await saveToCloud()) { addCloudLog('删除花卉', mName, fName); updateStats(); if(currentMember?.name === mName) renderMemberFlowers(m, currentFilter); }
    };

    function renderMemberFlowers(m, filter='all') {
        let fs = getAllFlowers(m);
        if(filter !== 'all') fs = fs.filter(f => f.quality === filter);
        currentFlowersList = fs;
        renderFlowerPage(fs, 1);
    }

    function performSearch() {
        const kw = document.getElementById('searchInput').value.trim(); if(!kw) return;
        if(queryMode === 'member') {
            const m = flowerData.find(m => m.name.includes(kw));
            if(m) {
                currentMember = m; filterTabs.style.display = 'flex';
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                document.querySelector('.filter-tab.all').classList.add('active');
                currentFilter = 'all'; renderMemberFlowers(m, 'all'); addCloudLog('查询成员', m.name);
            } else { resultArea.innerHTML = '<div style="color:#a00; text-align:center; padding:20px;">❌ 未找到</div>'; filterTabs.style.display = 'none'; }
        } else {
            const ms = flowerData.filter(m => ['仙','华','珍','普','凡'].some(q => m[q]?.some(f => f.includes(kw))));
            if(ms.length) {
                filterTabs.style.display = 'none';
                resultArea.innerHTML = `<div class="member-list">${ms.map(m => `<span class="member-tag" onclick="jumpToMember('${m.name}')">${m.name}</span>`).join('')}</div>`;
                addCloudLog('查询花卉', null, kw);
            } else { resultArea.innerHTML = '<div style="color:#a00; text-align:center; padding:20px;">❌ 未找到</div>'; filterTabs.style.display = 'none'; }
        }
    }

    window.jumpToMember = n => { queryMode='member'; document.getElementById('byMemberBtn').classList.add('active'); document.getElementById('byFlowerBtn').classList.remove('active'); document.getElementById('searchInput').value = n; performSearch(); };

    document.querySelectorAll('.filter-tab').forEach(t => t.addEventListener('click', () => {
        if(!currentMember) return;
        document.querySelectorAll('.filter-tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active'); currentFilter = t.dataset.filter;
        renderMemberFlowers(currentMember, currentFilter);
    }));

    function showMemberModal() {
        const ms = flowerData.map(m => ({ name: m.name, count: (m.仙?.length||0)+(m.华?.length||0)+(m.珍?.length||0)+(m.普?.length||0)+(m.凡?.length||0) })).sort((a,b)=>a.name.localeCompare(b.name));
        listModalData = ms; listModalTitle.innerHTML = '<i class="fas fa-users"></i> 成员列表'; renderListModal(ms); listModal.style.display = 'flex';
    }
    function showFlowerModal() {
        const map = new Map();
        flowerData.forEach(m => { ['仙','华','珍','普','凡'].forEach(q => { if(m[q]) m[q].forEach(f => map.set(f, (map.get(f)||0)+1)); }); });
        const fs = Array.from(map.entries()).map(([n,c]) => { const q = getFlowerQuality(n); return { name:n, count:c, quality:q, qo:{仙:1,华:2,珍:3,普:4,凡:5}[q]||5 }; }).sort((a,b)=> { if(a.qo!==b.qo) return a.qo-b.qo; if(a.quality==='凡') return getFanRank(a.name)-getFanRank(b.name); return a.name.localeCompare(b.name); });
        listModalData = fs; listModalTitle.innerHTML = '<i class="fas fa-flower"></i> 花卉图鉴'; renderListModal(fs); listModal.style.display = 'flex';
    }
    function renderListModal(items) {
        if(!items.length) { listModalContainer.innerHTML = '<div style="text-align:center; padding:30px;">暂无数据</div>'; return; }
        const qi = { '仙':'🔴', '华':'🟡', '珍':'🟣', '普':'🔵', '凡':'🟢' };
        listModalContainer.innerHTML = items.map(i => `<div class="modal-list-item" onclick="jumpToItem('${i.name}')"><span class="modal-item-name">${qi[i.quality]||'⚪'} ${i.name}</span><span class="modal-item-badge">${i.count}</span></div>`).join('');
    }
    window.filterListModal = () => { const kw = listModalSearch.value.toLowerCase(); renderListModal(listModalData.filter(i => i.name.toLowerCase().includes(kw))); };
    window.closeListModal = () => listModal.style.display = 'none';
    window.jumpToItem = n => { closeListModal(); if(listModalTitle.innerHTML.includes('成员')) jumpToMember(n); else jumpToFlower(n); };

    document.getElementById('memberStatsCard').onclick = showMemberModal;
    document.getElementById('flowerStatsCard').onclick = showFlowerModal;

    const byMemberBtn = document.getElementById('byMemberBtn');
    const byFlowerBtn = document.getElementById('byFlowerBtn');
    byMemberBtn.onclick = () => { queryMode='member'; byMemberBtn.classList.add('active'); byFlowerBtn.classList.remove('active'); document.getElementById('searchInput').placeholder='输入成员名字…'; filterTabs.style.display='none'; };
    byFlowerBtn.onclick = () => { queryMode='flower'; byFlowerBtn.classList.add('active'); byMemberBtn.classList.remove('active'); document.getElementById('searchInput').placeholder='输入花卉名称…'; filterTabs.style.display='none'; };
    document.getElementById('searchBtn').onclick = performSearch;
    document.getElementById('searchInput').onkeydown = e => { if(e.key==='Enter') performSearch(); };

    document.getElementById('addRecordBtn').onclick = async () => {
        const mName = document.getElementById('newMemberName').value.trim();
        const fName = document.getElementById('newFlowerName').value.trim();
        if(!mName||!fName) return;
        const q = getFlowerQuality(fName);
        let m = flowerData.find(m => m.name === mName); let isNew = false;
        if(!m) { m = { name: mName, 仙:[], 华:[], 珍:[], 普:[], 凡:[] }; flowerData.push(m); isNew = true; }
        if(!m[q]) m[q] = [];
        if(m[q].includes(fName)) { alert('已有此花'); return; }
        m[q].push(fName);
        if(await saveToCloud()) { addCloudLog(isNew?'新增成员':'添加花卉', mName, fName); document.getElementById('newMemberName').value=''; document.getElementById('newFlowerName').value=''; updateStats(); if(currentMember?.name === mName) renderMemberFlowers(m, currentFilter); }
    };

    // 批量导入
    window.openBatchModal = () => { batchModal.style.display = 'flex'; document.getElementById('batchMemberName').value = ''; document.getElementById('batchFlowersInput').value = ''; document.getElementById('batchPreview').innerHTML = ''; document.getElementById('batchResult').innerHTML = ''; pendingBatchFlowers = []; };
    window.closeBatchModal = () => batchModal.style.display = 'none';
    window.previewBatchFlowers = () => {
        const input = document.getElementById('batchFlowersInput').value;
        const flowers = input.split(/[\n,，\s]+/).map(f => f.trim()).filter(f => f.length > 0);
        pendingBatchFlowers = flowers;
        const qi = { '仙':'🔴', '华':'🟡', '珍':'🟣', '普':'🔵', '凡':'🟢' };
        const qc = { '仙':'#ffcdd2', '华':'#ffecb3', '珍':'#e1bee7', '普':'#bbdefb', '凡':'#c8e6c9' };
        const preview = flowers.map(f => { const q = getFlowerQuality(f); return `<span style="background:${qc[q]}; padding:4px 10px; border-radius:20px; margin:4px; font-size:0.85rem;">${qi[q]} ${f}</span>`; }).join('');
        document.getElementById('batchPreview').innerHTML = `<p style="margin-bottom:8px;"><strong>识别到 ${flowers.length} 种花：</strong></p>${preview}`;
    };
    window.executeBatchImport = async () => {
        const memberName = document.getElementById('batchMemberName').value.trim();
        if(!memberName) { alert('请输入成员名字'); return; }
        if(pendingBatchFlowers.length === 0) { alert('请先预览花卉'); return; }
        let member = flowerData.find(m => m.name === memberName); let isNew = false;
        if(!member) { member = { name: memberName, 仙:[], 华:[], 珍:[], 普:[], 凡:[] }; flowerData.push(member); isNew = true; }
        let added = 0;
        for(const f of pendingBatchFlowers) { const q = getFlowerQuality(f); if(!member[q]) member[q] = []; if(!member[q].includes(f)) { member[q].push(f); added++; } }
        if(await saveToCloud()) { addCloudLog(isNew?'批量新增成员':'批量添加花卉', memberName, `${added}种花`); document.getElementById('batchResult').innerHTML = `<span style="color:#2e7d32;"><i class="fas fa-check-circle"></i> 成功导入 ${added} 种花卉！</span>`; updateStats(); setTimeout(() => closeBatchModal(), 1500); }
        else { document.getElementById('batchResult').innerHTML = `<span style="color:#d32f2f;">导入失败</span>`; }
    };

    document.getElementById('refreshDataBtn').onclick = loadData;
    window.toggleCollapse = id => { const p = document.getElementById(id), i = document.getElementById(id==='addPanel'?'addIcon':'logIcon'); p.classList.toggle('open'); i.classList.toggle('fa-chevron-down'); i.classList.toggle('fa-chevron-up'); if(id==='logPanel' && p.classList.contains('open')) loadCloudLogs(); };

    checkAuth();
    document.getElementById('addPanel').classList.add('open');
    document.getElementById('addIcon').classList.add('fa-chevron-up');
})();
</script>
</body>
</html>
